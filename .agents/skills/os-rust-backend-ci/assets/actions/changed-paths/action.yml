name: Changed paths
description: >
  Detect whether API or portal paths were touched by the latest push.
  For pull_request.synchronize, diff the latest push only so docs-only follow-up
  commits do not re-run older API or portal work. Fall back to the full PR diff
  when GitHub does not provide a reachable previous head.

outputs:
  api:
    description: "true if API or API CI workflow paths changed"
    value: ${{ steps.filter.outputs.api }}
  web:
    description: "true if portal or portal CI workflow paths changed"
    value: ${{ steps.filter.outputs.web }}

runs:
  using: composite
  steps:
    - id: filter
      shell: bash
      env:
        EVENT_ACTION: ${{ github.event.action }}
        EVENT_BEFORE: ${{ github.event.before }}
        EVENT_NAME: ${{ github.event_name }}
        BASE_REF: ${{ github.base_ref }}
      run: |
        set -euo pipefail

        zero_sha="0000000000000000000000000000000000000000"

        reachable() {
          local sha="$1"
          [[ -n "$sha" ]] && [[ "$sha" != "$zero_sha" ]] && git cat-file -e "$sha^{commit}" 2>/dev/null
        }

        BASE=""
        case "$EVENT_NAME" in
          pull_request)
            if [[ "$EVENT_ACTION" == "synchronize" ]] && reachable "$EVENT_BEFORE"; then
              BASE="$EVENT_BEFORE"
            else
              git fetch origin "$BASE_REF"
              BASE="origin/$BASE_REF"
            fi
            ;;
          push)
            if reachable "$EVENT_BEFORE"; then
              BASE="$EVENT_BEFORE"
            fi
            ;;
        esac

        api=false
        web=false

        if [[ -z "$BASE" ]]; then
          api=true
          web=true
        else
          if ! git diff --quiet "$BASE...HEAD" -- \
                'api/' \
                '.github/actions/changed-paths/' \
                '.github/actions/setup-rust/' \
                '.github/workflows/api.yml' \
                '.github/workflows/build-api.yml' \
                '.github/workflows/promote.yml' \
                'Makefile'; then
            api=true
          fi
          if ! git diff --quiet "$BASE...HEAD" -- \
                'web/' \
                '.github/actions/changed-paths/' \
                '.github/workflows/web.yml' \
                '.github/workflows/build-web.yml' \
                '.github/workflows/promote.yml' \
                'Makefile'; then
            web=true
          fi
        fi

        echo "BASE=$BASE"
        echo "api=$api"
        echo "web=$web"
        echo "api=$api" >> "$GITHUB_OUTPUT"
        echo "web=$web" >> "$GITHUB_OUTPUT"
