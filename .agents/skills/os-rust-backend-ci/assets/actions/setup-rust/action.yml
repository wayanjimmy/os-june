name: Setup Rust
description: >
  Install the Rust toolchain from api/rust-toolchain.toml and cache cargo
  registry plus build artifacts for the API workspace.

inputs:
  build-profile:
    description: "Build profile: dev, release, or test. Defines caching strategy."
    required: false
    default: dev
  save-build-cache:
    description: "Whether to save build artifacts back to the cache after the job."
    required: false
    default: "true"
  working-directory:
    description: "Directory containing rust-toolchain.toml and Cargo.lock."
    required: false
    default: api

runs:
  using: composite
  steps:
    - name: Install tomlq if needed
      shell: bash
      run: |
        # The `yq` PyPI package ships `tomlq` alongside `yq` — we need
        # `tomlq` to read `rust-toolchain.toml` in the next step.
        if ! command -v tomlq &>/dev/null; then
          pip install yq
        fi

    - name: Install rustup if needed
      shell: bash
      run: |
        if ! command -v rustup &>/dev/null; then
          curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -fsSL \
            "https://sh.rustup.rs" | sh -s -- --default-toolchain none -y
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"
        fi

    - name: Read channel from rust-toolchain.toml
      id: toolchain-channel
      shell: bash
      run: |
        value=$(cat "${{ inputs.working-directory }}/rust-toolchain.toml" | tomlq -r .toolchain.channel)
        echo "value=$value" >> "$GITHUB_OUTPUT"

    - name: Read components from rust-toolchain.toml
      id: toolchain-components
      shell: bash
      run: |
        value=$(cat "${{ inputs.working-directory }}/rust-toolchain.toml" | tomlq -r '.toolchain.components | join(" ")')
        echo "value=$value" >> "$GITHUB_OUTPUT"

    - name: Install rust toolchain
      id: install-rust-toolchain
      shell: bash
      env:
        CHANNEL: ${{ steps.toolchain-channel.outputs.value }}
      run: |
        if [[ -z "$CHANNEL" ]]; then
          echo "Could not find toolchain.channel in rust-toolchain.toml"
          exit 1
        fi
        rustup toolchain install "$CHANNEL" --profile minimal
        echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

    - name: Add components
      if: steps.toolchain-components.outputs.value != ''
      shell: bash
      env:
        COMPONENTS: ${{ steps.toolchain-components.outputs.value }}
        CHANNEL: ${{ steps.toolchain-channel.outputs.value }}
      run: |
        for component in $COMPONENTS; do
          rustup component add "$component" --toolchain "$CHANNEL"
        done

    - name: Install mold linker
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq mold

    - name: Cache cargo registry
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ runner.os }}-cargo-deps-${{ hashFiles(format('{0}/Cargo.lock', inputs.working-directory)) }}
        restore-keys: |
          ${{ runner.os }}-cargo-deps-

    - name: Restore build artifacts
      if: ${{ inputs.save-build-cache != 'true' }}
      uses: actions/cache/restore@v5
      with:
        path: ${{ inputs.working-directory }}/target/
        key: ${{ runner.os }}-target-${{ inputs.build-profile }}-${{ hashFiles(format('{0}/Cargo.lock', inputs.working-directory)) }}
        restore-keys: |
          ${{ runner.os }}-target-${{ inputs.build-profile }}-

    - name: Cache build artifacts
      if: ${{ inputs.save-build-cache == 'true' }}
      uses: actions/cache@v5
      with:
        path: ${{ inputs.working-directory }}/target/
        key: ${{ runner.os }}-target-${{ inputs.build-profile }}-${{ hashFiles(format('{0}/Cargo.lock', inputs.working-directory)) }}
        restore-keys: |
          ${{ runner.os }}-target-${{ inputs.build-profile }}-

    - name: Cache cargo tools
      uses: actions/cache@v5
      with:
        path: ~/.cargo/bin/
        key: ${{ runner.os }}-cargo-tools-${{ hashFiles('.github/actions/setup-rust/action.yml', '.github/workflows/api.yml') }}
        restore-keys: |
          ${{ runner.os }}-cargo-tools-
