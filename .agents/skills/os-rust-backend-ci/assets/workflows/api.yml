name: API

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  RUSTFLAGS: "-D warnings"

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.detect.outputs.api }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        uses: ./.github/actions/changed-paths

  fmt-check:
    name: Format
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          build-profile: dev
      - name: Check formatting
        run: make api-fmt-check

  lint:
    name: Clippy
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          build-profile: dev
      - name: Run clippy
        run: make api-lint

  test:
    name: Tests
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # NOTE: replace the POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD
      # values with whatever your tests expect, or read them from a Makefile
      # variable. Both repos default to the service name.
      - name: Start Postgres
        run: |
          docker run -d --name postgres \
            -e POSTGRES_DB=app \
            -e POSTGRES_USER=app \
            -e POSTGRES_PASSWORD=app \
            -p 5432:5432 \
            postgres:17 \
            -c fsync=off \
            -c synchronous_commit=off \
            -c full_page_writes=off \
            -c autovacuum=off \
            -c max_connections=200 \
            -c shared_buffers=256MB

          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U app -d app >/dev/null 2>&1; then
              echo "Postgres ready after ${i}s"
              break
            fi
            sleep 1
          done
          docker exec postgres pg_isready -U app -d app

      - uses: ./.github/actions/setup-rust
        with:
          build-profile: test
          save-build-cache: "false"

      - name: Run tests
        run: make api-test

  contract:
    name: Contract
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          build-profile: dev

      # Drop the bun + frontend deps blocks below if the repo doesn't ship a
      # frontend that generates TS types from openapi.json. The `contract-check`
      # make target then only diffs the regenerated openapi.json.

      - name: Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Cache web deps
        uses: actions/cache@v5
        with:
          path: web/node_modules
          key: ${{ runner.os }}-web-bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-web-bun-

      - name: Install web deps
        run: make web-install

      - name: Check generated API contract
        run: make contract-check

  summary:
    name: API Checks Passed
    runs-on: ubuntu-latest
    needs: [changes, fmt-check, lint, test, contract]
    if: ${{ !cancelled() }}
    steps:
      - name: Check results
        run: |
          echo "changes.result:  ${{ needs.changes.result }}"
          echo "changes.api:     ${{ needs.changes.outputs.api }}"
          echo "fmt-check:       ${{ needs.fmt-check.result }}"
          echo "lint:            ${{ needs.lint.result }}"
          echo "test:            ${{ needs.test.result }}"
          echo "contract:        ${{ needs.contract.result }}"

          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "changes job did not succeed"
            exit 1
          fi

          case "${{ needs.changes.outputs.api }}" in
            true) ;;
            false) echo "no API changes; vacuous pass"; exit 0 ;;
            *) echo "changes.outputs.api was '${{ needs.changes.outputs.api }}'"; exit 1 ;;
          esac

          if [[ "${{ needs.fmt-check.result }}" == "success" && \
                "${{ needs.lint.result }}" == "success" && \
                "${{ needs.test.result }}" == "success" && \
                "${{ needs.contract.result }}" == "success" ]]; then
            echo "All API checks passed"
          else
            echo "Some API checks failed"
            exit 1
          fi
