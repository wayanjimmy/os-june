name: Build & push API image

# Replace `<service>-api` everywhere below with your service noun, e.g.
# `os-accounts-api`, `fellow-api`, `library-api`.

# Scope: this workflow builds and pushes the image to GHCR. It does NOT
# deploy anywhere. Deployment is owned by whoever runs the service and
# should live in a separate workflow that consumes the GHCR tag.

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/build-api.yml'
  workflow_dispatch:

concurrency:
  group: build-api-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/<service>-api

jobs:
  build:
    name: Build & push
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      sha_short: ${{ steps.meta.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute metadata
        id: meta
        run: |
          sha_short=$(git rev-parse --short=7 HEAD)
          echo "sha_short=${sha_short}" >> "$GITHUB_OUTPUT"
          # head_commit.timestamp is null on workflow_dispatch — fall back to now.
          created="${{ github.event.head_commit.timestamp }}"
          if [[ -z "$created" ]]; then
            created=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          fi
          echo "created=${created}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.IMAGE }}:staging
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          provenance: true
          sbom: true

      - name: Summary
        run: |
          {
            echo "### API image built"
            echo "- **Tag:** \`${{ env.IMAGE }}:${{ steps.meta.outputs.sha_short }}\`"
            echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`"
            echo "- **Commit:** ${{ github.sha }}"
            echo ""
            echo "Deploy this image with whatever owns runtime — this pipeline stops at GHCR."
          } >> "$GITHUB_STEP_SUMMARY"
