name: Promote artifact to production

# Replace `<service>-api` and `<service>-portal` with your service names below.
# If you don't have a portal artifact yet, delete the `portal` choice from
# `inputs.artifact.options`, the `all` expansion's portal entry, and the
# `portal)` branches in the case statements.

# Scope: this workflow re-tags an existing GHCR image as `:production`.
# It does NOT deploy. Deployment is owned by whoever runs the service and
# should consume the `:production` tag (or, better, the resolved SHA) on
# their own schedule.

on:
  workflow_dispatch:
    inputs:
      artifact:
        description: Which artifact(s) to promote.
        required: true
        type: choice
        options:
          - all
          - api
          - portal
      from-tag:
        description: Source tag to promote. Use staging for normal release or a short SHA for rollback.
        required: false
        default: staging
        type: string

permissions:
  contents: read
  packages: write

env:
  GHCR_OWNER: ${{ github.repository_owner }}

concurrency:
  group: promote-production
  cancel-in-progress: false

jobs:
  select:
    name: Select artifacts
    runs-on: ubuntu-latest
    outputs:
      artifacts: ${{ steps.artifacts.outputs.artifacts }}
    steps:
      - name: Expand artifact selection
        id: artifacts
        env:
          ARTIFACT: ${{ inputs.artifact }}
        run: |
          set -euo pipefail

          case "$ARTIFACT" in
            all)
              ARTIFACTS='["api","portal"]'
              ;;
            api|portal)
              ARTIFACTS="[\"$ARTIFACT\"]"
              ;;
            *)
              echo "::error::Unknown artifact selection: $ARTIFACT"
              exit 2
              ;;
          esac

          echo "artifacts=${ARTIFACTS}" >> "$GITHUB_OUTPUT"

  verify-images:
    name: Verify ${{ matrix.artifact }} image
    needs: select
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        artifact: ${{ fromJson(needs.select.outputs.artifacts) }}
    env:
      FROM_TAG: ${{ inputs.from-tag }}
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: image
        env:
          ARTIFACT: ${{ matrix.artifact }}
          GHCR_OWNER: ${{ env.GHCR_OWNER }}
        run: |
          case "$ARTIFACT" in
            api)    IMAGE="ghcr.io/${GHCR_OWNER}/<service>-api" ;;
            portal) IMAGE="ghcr.io/${GHCR_OWNER}/<service>-portal" ;;
            *)      echo "::error::Unknown artifact: $ARTIFACT"; exit 2 ;;
          esac
          echo "name=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Verify source image exists
        run: |
          set -euo pipefail

          image="${{ steps.image.outputs.name }}:${FROM_TAG}"
          if ! docker buildx imagetools inspect "$image" --raw > /dev/null 2>&1; then
            echo "::error::Image $image was not found in GHCR. Build that artifact/tag first, then rerun promotion."
            exit 1
          fi

          echo "Found $image"

  retag:
    name: Retag ${{ matrix.artifact }} :production
    needs:
      - select
      - verify-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        artifact: ${{ fromJson(needs.select.outputs.artifacts) }}
    env:
      FROM_TAG: ${{ inputs.from-tag }}
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve artifact
        id: artifact
        env:
          ARTIFACT: ${{ matrix.artifact }}
          GHCR_OWNER: ${{ env.GHCR_OWNER }}
        run: |
          case "$ARTIFACT" in
            api)    IMAGE="ghcr.io/${GHCR_OWNER}/<service>-api" ;;
            portal) IMAGE="ghcr.io/${GHCR_OWNER}/<service>-portal" ;;
            *)      echo "::error::Unknown artifact: $ARTIFACT"; exit 2 ;;
          esac
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Resolve source to SHA tag
        id: image
        run: |
          set -euo pipefail

          source="${{ steps.artifact.outputs.image }}:${FROM_TAG}"
          rev=$(docker buildx imagetools inspect "$source" --format '{{json .Image}}' \
            | jq -r 'first(.. | objects | select(.config?.Labels?["org.opencontainers.image.revision"] != null) | .config.Labels["org.opencontainers.image.revision"]) // empty')

          if [[ -z "$rev" && "$FROM_TAG" =~ ^[0-9a-f]{7,40}$ ]]; then
            rev="$FROM_TAG"
          fi

          if [[ -z "$rev" ]]; then
            echo "::error::Could not resolve commit SHA for $source. Use an image built by this repository, or pass a SHA tag directly."
            exit 1
          fi

          sha_short="${rev:0:7}"
          echo "sha_short=${sha_short}" >> "$GITHUB_OUTPUT"
          echo "source=${source}" >> "$GITHUB_OUTPUT"
          echo "Resolved $source to $sha_short"

      - name: Retag SHA to production
        run: |
          set -euo pipefail

          image="${{ steps.artifact.outputs.image }}"
          sha_image="${image}:${{ steps.image.outputs.sha_short }}"
          target="${image}:production"

          digest=$(docker buildx imagetools inspect "$sha_image" \
            --format '{{ json .Manifest }}' | jq -r '.digest')
          if [[ -z "$digest" || "$digest" == "null" ]]; then
            echo "::error::Could not resolve digest for $sha_image"
            exit 1
          fi

          docker buildx imagetools create --tag "$target" "${image}@${digest}"
          echo "Retagged $sha_image as $target"

      - name: Summary
        run: |
          {
            echo "### Promoted ${{ matrix.artifact }}"
            echo "- **Source tag:** \`${FROM_TAG}\`"
            echo "- **Resolved SHA:** \`${{ steps.image.outputs.sha_short }}\`"
            echo "- **Target tag:** \`${{ steps.artifact.outputs.image }}:production\`"
            echo ""
            echo "Tag movement complete in GHCR. Deployer-side rollout is its own thing."
          } >> "$GITHUB_STEP_SUMMARY"
