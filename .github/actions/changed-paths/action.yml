name: changed-paths
description: Decide whether scribe-api/** changed since the right diff base.
outputs:
  scribe_api_changed:
    description: "true if any file under scribe-api/ changed in this event"
    value: ${{ steps.diff.outputs.scribe_api_changed }}
runs:
  using: composite
  steps:
    - name: Resolve diff base
      id: base
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
        else
          echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Diff paths
      id: diff
      shell: bash
      run: |
        base="${{ steps.base.outputs.ref }}"
        if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
          echo "scribe_api_changed=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if git diff --name-only "$base" HEAD -- scribe-api/ | grep -q .; then
          echo "scribe_api_changed=true" >> "$GITHUB_OUTPUT"
        else
          echo "scribe_api_changed=false" >> "$GITHUB_OUTPUT"
        fi
