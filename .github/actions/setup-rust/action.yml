name: setup-rust
description: Install the Rust toolchain pinned in scribe-api/rust-toolchain.toml plus mold and registry/target caches.
runs:
  using: composite
  steps:
    - name: Install mold linker
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends mold

    - name: Read toolchain
      id: toolchain
      shell: bash
      run: |
        channel=$(grep -E '^channel' scribe-api/rust-toolchain.toml | head -1 | cut -d'"' -f2)
        echo "channel=$channel" >> "$GITHUB_OUTPUT"

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
      with:
        toolchain: ${{ steps.toolchain.outputs.channel }}
        components: rustfmt, clippy

    - name: Cache cargo registry
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
        key: cargo-registry-${{ runner.os }}-${{ hashFiles('scribe-api/Cargo.lock') }}
        restore-keys: |
          cargo-registry-${{ runner.os }}-

    - name: Cache cargo target
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: scribe-api/target
        key: cargo-target-${{ runner.os }}-${{ hashFiles('scribe-api/Cargo.lock') }}
        restore-keys: |
          cargo-target-${{ runner.os }}-

    - name: Configure mold as default linker
      shell: bash
      working-directory: scribe-api
      run: |
        mkdir -p .cargo
        cat > .cargo/config.toml <<'EOF'
        [target.x86_64-unknown-linux-gnu]
        linker = "clang"
        rustflags = ["-C", "link-arg=-fuse-ld=mold"]
        EOF
