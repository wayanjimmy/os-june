name: build-scribe-api

on:
  push:
    branches: [main]
    paths:
      - "scribe-api/**"
      - ".github/actions/phala-deploy/**"
      - ".github/workflows/build-scribe-api.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-scribe-api-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/scribe-api

jobs:
  build:
    name: Build & push
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
          # Reproducibility: derive timestamps from the commit, not build time,
          # so a rebuild of the same commit yields the same image bytes.
          echo "epoch=$(git log -1 --pretty=%ct)" >> "$GITHUB_OUTPUT"
          echo "created=$(git log -1 --pretty=%cI)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        env:
          # Normalizes layer/file timestamps to the commit time (with
          # rewrite-timestamp below) so the image digest is reproducible.
          SOURCE_DATE_EPOCH: ${{ steps.meta.outputs.epoch }}
        with:
          context: scribe-api
          file: scribe-api/Dockerfile
          # `outputs` (not push:+tags:) so we can pass rewrite-timestamp, which
          # applies SOURCE_DATE_EPOCH to layer timestamps. Pushes both tags.
          outputs: type=image,"name=${{ env.IMAGE }}:${{ steps.meta.outputs.sha_short }},${{ env.IMAGE }}:staging",push=true,rewrite-timestamp=true
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
          cache-from: type=gha,scope=scribe-api
          cache-to: type=gha,scope=scribe-api,mode=max
          # No provenance/SBOM attestations: they make build.outputs.digest an OCI
          # *index* (image + attestation manifests) that dstack cannot pull by
          # digest at CVM image-pull time. Disabling them yields a plain single-arch
          # image manifest whose digest is pullable AND is what the TEE attestation
          # binds — and it keeps the door open to reproducible (rebuild-and-verify)
          # digests, the trust model we actually want. We consume neither attestation.
          provenance: false
          sbom: false

      - name: Summary
        run: |
          {
            echo "### scribe-api image built"
            echo "- **Tag:** \`${{ env.IMAGE }}:${{ steps.meta.outputs.sha_short }}\`"
            echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`"
            echo "- **Commit:** ${{ github.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-staging:
    name: Deploy staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    # contents: write lets the post-deploy step push the digest-record git tag
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - id: deploy
        uses: ./.github/actions/phala-deploy
        with:
          cvm-name: os-scribe-api-staging
          compose-file: scribe-api/deploy/docker-compose.staging.yml
          # Pin by per-commit tag, not @digest: dstack's GHCR prelaunch verify
          # parses image refs as repo:tag and mangles repo@sha256:digest (cuts at
          # the ':' in sha256:), so any digest ref 404s and the CVM never boots.
          # The sha_short tag is unique per commit and pullable by that verifier.
          image-ref: ${{ env.IMAGE }}:${{ needs.build.outputs.sha_short }}
          api-key: ${{ secrets.PHALA_CLOUD_API_KEY }}

      # Anchor "b": record that commit <sha> deployed image digest <D> as an
      # annotated git tag. Gives a verifier an in-repo, immutable link from the
      # attested tag to a content digest, without trusting the registry's
      # tag→digest mapping. (Pairs with reproducible builds: rebuild <sha> → D.)
      - name: Record deployed digest
        if: steps.deploy.outputs.deployed == 'true'
        env:
          DIGEST: ${{ needs.build.outputs.digest }}
          IMG: ${{ env.IMAGE }}:${{ needs.build.outputs.sha_short }}
          SHA_SHORT: ${{ needs.build.outputs.sha_short }}
          FULL_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          tag="deploy/staging/${SHA_SHORT}"
          # Create-once so the record is genuinely immutable. A reproducible build
          # means the same commit always yields the same digest, so a re-run for an
          # existing tag is a no-op — never force-overwrite.
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag \`${tag}\` already recorded; left unchanged." >> "$GITHUB_STEP_SUMMARY"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "staging deploy: ${IMG} = ${DIGEST} (commit ${FULL_SHA})"
            git push origin "refs/tags/${tag}"
            echo "Recorded \`${tag}\` → \`${DIGEST}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
