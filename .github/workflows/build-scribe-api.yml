name: build-scribe-api

on:
  push:
    branches: [main]
    paths:
      - "scribe-api/**"
      - ".github/workflows/build-scribe-api.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-scribe-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: scribe-api
          file: scribe-api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/scribe-api:${{ steps.sha.outputs.short }}
            ghcr.io/${{ github.repository_owner }}/scribe-api:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
