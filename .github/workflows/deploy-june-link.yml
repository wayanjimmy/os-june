name: deploy-june-link

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: Existing June API image tag to deploy after viewer-only smoke tests.
        required: false
        default: production
        type: string
      confirmation:
        description: Type deploy-june.link to confirm the isolated deployment.
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-june-link
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/june-api
  CVM_NAME: os-june-link-production

jobs:
  deploy:
    name: Deploy isolated share viewer
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate explicit confirmation and image tag
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          set -euo pipefail
          if [[ "$CONFIRMATION" != "deploy-june.link" ]]; then
            echo "::error::confirmation must be exactly deploy-june.link"
            exit 1
          fi
          if [[ ! "$IMAGE_TAG" =~ ^[A-Za-z0-9_.-]{1,128}$ ]]; then
            echo "::error::image-tag is not a valid container tag"
            exit 1
          fi

      - name: Verify the primary API and delegated DNS before deploy
        run: |
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 \
            https://june-api.opensoftware.co/healthz)
          if [[ "$code" != "200" ]]; then
            echo "::error::Primary June API is not healthy before the isolated deploy (HTTP $code)."
            exit 1
          fi

          ns=$(dig +short NS june.link | tr '[:upper:]' '[:lower:]' | sort)
          if ! grep -qx 'amos.ns.cloudflare.com.' <<<"$ns" || \
             ! grep -qx 'gigi.ns.cloudflare.com.' <<<"$ns"; then
            echo "::error::june.link is not delegated to the expected Cloudflare nameservers."
            printf '%s\n' "$ns"
            exit 1
          fi

          # The isolated ingress may not have published its final dstack
          # binding yet, but registrar parking must be gone before it starts.
          # Cloudflare flattens apex CNAMEs, so inspect resolved A records only
          # for the known Namecheap parking targets here.
          addresses=$(dig +short A june.link | sort)
          if grep -Eq '^(198\.54\.117\.200|198\.54\.117\.201)$' <<<"$addresses"; then
            echo "::error::june.link still resolves to a Namecheap parking address."
            printf '%s\n' "$addresses"
            exit 1
          fi

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@ab5c1da94f53f5cd75c1038092aa276dddfccbba # v1.9.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve the image once
        id: image
        env:
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          set -euo pipefail
          source="${IMAGE}:${IMAGE_TAG}"
          digest=$(docker buildx imagetools inspect "$source" \
            --format '{{ json .Manifest }}' | jq -r '.digest')
          revision=$(docker buildx imagetools inspect "$source" --format '{{json .Image}}' \
            | jq -r 'first(.. | objects | select(.config?.Labels?["org.opencontainers.image.revision"] != null) | .config.Labels["org.opencontainers.image.revision"]) // empty')
          if [[ ! "$digest" =~ ^sha256:[a-f0-9]{64}$ || ! "$revision" =~ ^[0-9a-f]{7,40}$ ]]; then
            echo "::error::Could not resolve a digest and source revision for $source."
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "sha-short=${revision:0:7}" >> "$GITHUB_OUTPUT"

      - name: Prove the image supports the viewer-only boundary
        env:
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          set -euo pipefail
          container=$(docker run -d --rm -p 127.0.0.1:18080:8080 \
            -e JUNE__SHARE__VIEWER_ONLY=true \
            -e JUNE__OS_ACCOUNTS__API_URL=https://accounts-api.opensoftware.co \
            -e JUNE__OS_ACCOUNTS__ISS=https://accounts.opensoftware.co \
            "${IMAGE}:${IMAGE_TAG}")
          trap 'docker rm -f "$container" >/dev/null 2>&1 || true' EXIT
          code=""
          for _ in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 2 \
              http://127.0.0.1:18080/healthz || true)
            [[ "$code" == "200" ]] && break
            sleep 2
          done
          if [[ "$code" != "200" ]]; then
            docker logs "$container"
            echo "::error::Candidate image did not become healthy in viewer-only mode."
            exit 1
          fi
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 2 \
            http://127.0.0.1:18080/v1/models)
          if [[ "$code" != "404" ]]; then
            echo "::error::Candidate image exposed /v1/models in viewer-only mode (HTTP $code)."
            exit 1
          fi

      - name: Pin an immutable pullable tag
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${IMAGE}:${{ steps.image.outputs.sha-short }}" \
            "${IMAGE}@${{ steps.image.outputs.digest }}"

      - id: phala
        uses: ./.github/actions/phala-deploy
        with:
          cvm-name: ${{ env.CVM_NAME }}
          compose-file: june-api/deploy/docker-compose.june-link.yml
          image-ref: ${{ env.IMAGE }}:${{ steps.image.outputs.sha-short }}
          api-key: ${{ secrets.PHALA_CLOUD_API_KEY }}
          require-existing: "true"

      - name: Verify the isolated viewer and primary API after deploy
        if: steps.phala.outputs.deployed == 'true'
        run: |
          set -euo pipefail
          code=""
          for _ in $(seq 1 60); do
            primary=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 \
              https://june-api.opensoftware.co/healthz || true)
            if [[ "$primary" != "200" ]]; then
              echo "::error::Primary June API became unhealthy during the isolated deploy (HTTP $primary)."
              exit 1
            fi
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 \
              https://june.link/healthz || true)
            [[ "$code" == "200" ]] && break
            sleep 10
          done
          if [[ "$code" != "200" ]]; then
            echo "::error::june.link/healthz did not return 200 within 10 minutes (last: $code)."
            exit 1
          fi

          models=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 \
            https://june.link/v1/models)
          shell=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 \
            https://june.link/s/shr_deployment_probe)
          missing=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 \
            'https://june.link/v1/shares/shr_deployment_probe/link-view?link=inv_deployment_probe')
          if [[ "$models" != "404" || "$shell" != "200" || "$missing" != "404" ]]; then
            echo "::error::Viewer contract failed: models=$models shell=$shell missing-link=$missing"
            exit 1
          fi
          app_address=$(dig +short TXT _dstack-app-address.june.link | tr -d '"')
          if [[ ! "$app_address" =~ ^[a-f0-9]{40}:443$ ]]; then
            echo "::error::june.link has no valid dstack app-address binding after deploy (found: ${app_address:-none})."
            exit 1
          fi
          echo "june.link viewer-only contract OK; primary API remained healthy"
