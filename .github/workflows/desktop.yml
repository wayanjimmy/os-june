name: desktop

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - ".github/workflows/desktop.yml"
      - "hud.html"
      - "index.html"
      - "meeting-hud.html"
      - "biome.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "src-tauri/**"
      - "tsconfig.json"
      - "vite.config.ts"
  push:
    branches: [main]
    paths:
      - ".github/workflows/desktop.yml"
      - "hud.html"
      - "index.html"
      - "meeting-hud.html"
      - "biome.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "src-tauri/**"
      - "tsconfig.json"
      - "vite.config.ts"

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend lint and tests
    needs: changes
    if: >-
      needs.changes.outputs.frontend == 'true' &&
      (github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'run-frontend-ci'))
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Vitest
        run: pnpm test

  # Biome enforces JS/TS/JSON/CSS formatting + linting for src/ and scripts/.
  # `pnpm check` fails on formatting drift, lint errors, and banned imports
  # (the icons-central-only spec bans lucide via noRestrictedImports).
  # Keep it in hosted PR CI because it is cheap and catches style drift before
  # review. The slower frontend typecheck + Vitest job is local signoff by
  # default; add `run-frontend-ci` to force the hosted job.
  biome:
    name: Biome check
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm check

  # Decides whether the macOS Rust job has anything to test. macOS minutes
  # bill at 10x Linux, and most changes here are frontend-only — `cargo test`
  # reads nothing outside src-tauri/, so a pure frontend diff doesn't need a
  # macOS runner. The Windows bundle job has a broader packaged-app diff scope
  # because it verifies the built frontend, Tauri config, and installer shape
  # on a native Windows host. Unknown diff bases (force pushes, branch creation) fail
  # open to "changed" so the suite can never be skipped by accident.
  changes:
    name: Changed paths
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      frontend: ${{ steps.diff.outputs.frontend }}
      rust: ${{ steps.diff.outputs.rust }}
      desktop_bundle: ${{ steps.diff.outputs.desktop_bundle }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Diff changed paths
        id: diff
        env:
          BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]] \
            || ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "rust=true" >> "$GITHUB_OUTPUT"
            echo "desktop_bundle=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed_files="$(git diff --name-only "$BASE" HEAD)"
          # Frontend checks (biome, typecheck, vitest) read src/ and scripts/, never
          # src-tauri/, so a src-tauri-only diff skips them and vice versa.
          if printf '%s\n' "$changed_files" | grep -Eq '^(\.github/workflows/desktop\.yml$|biome\.json$|hud\.html$|index\.html$|meeting-hud\.html$|package\.json$|pnpm-lock\.yaml$|public/|scripts/|src/|tsconfig\.json$|vite\.config\.ts$)'; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi
          if printf '%s\n' "$changed_files" | grep -Eq '^(src-tauri/|\.github/workflows/desktop\.yml$)'; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=false" >> "$GITHUB_OUTPUT"
          fi
          if printf '%s\n' "$changed_files" | grep -Eq '^(\.github/workflows/desktop\.yml$|hud\.html$|index\.html$|meeting-hud\.html$|package\.json$|pnpm-lock\.yaml$|public/|scripts/|src/|src-tauri/|tsconfig\.json$|vite\.config\.ts$)'; then
            echo "desktop_bundle=true" >> "$GITHUB_OUTPUT"
          else
            echo "desktop_bundle=false" >> "$GITHUB_OUTPUT"
          fi

  # rustfmt needs no compilation and none of the macOS-only system deps, so it
  # runs on cheap Linux for fast feedback. PR clippy/tests for src-tauri are
  # handled by local gh-signoff (`make signoff-rust-macos`) to avoid paying for
  # repeated macOS runner minutes while an agent or developer is still iterating.
  # The full macOS job still runs after merge to main and can be forced on a PR
  # by adding the `run-macos-ci` label.
  rust-fmt:
    name: Tauri Rust format
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: Cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

  rust:
    name: Tauri Rust clippy and tests
    needs: changes
    if: >-
      needs.changes.outputs.rust == 'true' &&
      (github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'run-macos-ci'))
    runs-on: blacksmith-6vcpu-macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: tauri-cargo-registry-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            tauri-cargo-registry-${{ runner.os }}-

      - name: Cache cargo target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: src-tauri/target
          key: tauri-cargo-target-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            tauri-cargo-target-${{ runner.os }}-

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  windows-rust:
    name: Tauri Windows build
    needs: changes
    if: github.event_name == 'workflow_dispatch' && needs.changes.outputs.desktop_bundle == 'true'
    runs-on: blacksmith-4vcpu-windows-2025
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Windows packaging tools
        shell: pwsh
        run: |
          choco install nsis 7zip -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: tauri-cargo-registry-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            tauri-cargo-registry-${{ runner.os }}-

      - name: Cache cargo target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: src-tauri/target
          key: tauri-cargo-target-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            tauri-cargo-target-${{ runner.os }}-

      - name: Bundle Hermes runtime
        shell: pwsh
        run: ./scripts/bundle-hermes-runtime-windows.ps1

      - name: Tauri Windows bundle
        run: node scripts/tauri-build.mjs --debug --no-sign

      - name: Verify Windows bundle
        shell: pwsh
        run: |
          $exe = Get-Item "src-tauri/target/debug/os-june.exe" -ErrorAction Stop
          if ($exe.Length -le 0) {
            throw "Windows app executable is empty."
          }

          $setup = Get-ChildItem "src-tauri/target/debug/bundle/nsis" -Filter "*-setup.exe" | Select-Object -First 1
          if ($null -eq $setup) {
            throw "NSIS setup.exe was not produced."
          }
          if ($setup.Length -le 0) {
            throw "NSIS setup.exe is empty."
          }

          $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
          if (!(Test-Path $sevenZip)) {
            throw "7-Zip was not installed at $sevenZip."
          }
          $listing = & $sevenZip l $setup.FullName
          if ($LASTEXITCODE -ne 0) {
            throw "Could not inspect NSIS installer payload."
          }
          if (($listing | Measure-Object).Count -le 0) {
            throw "NSIS installer payload listing is empty."
          }
          $listingText = ($listing -join "`n").Replace("\", "/")
          foreach ($expected in @("native/hermes/bin/hermes.exe", "native/hermes/python/current/python.exe", "native/hermes/hermes-agent/pyproject.toml")) {
            if ($listingText -notmatch [regex]::Escape($expected)) {
              throw "NSIS installer payload does not include bundled Hermes file $expected."
            }
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: june-windows-debug-nsis
          path: src-tauri/target/debug/bundle/nsis/*-setup.exe

# Coverage reruns of these suites live in coverage.yml (manual-only). They
# duplicated this workflow's jobs on a macOS runner for every push and PR
# sync, gated nothing (continue-on-error), and produced artifacts nothing
# downloads — the single largest Actions line item in the repo.
