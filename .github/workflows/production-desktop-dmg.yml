name: production-desktop-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to release (for example 0.2.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: production-desktop-release
  cancel-in-progress: false

# Opt the bundled JS actions (checkout, cache, setup-node, create-github-app-token,
# pnpm/action-setup) into the Node 24 runtime — Node 20 is deprecated and will be
# forced off the runners. Independent of node-version below (the Node our own build
# scripts run on).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Release production macOS app
    runs-on: macos-latest
    environment: production
    steps:
      # Mint a short-lived token from the release GitHub App, scoped to BOTH the
      # private source repo (to push the version-bump commit to main) and the
      # public releases repo (tauri-action publishes there). One App is the sole
      # release identity — org-owned, no personal PAT — and is the ruleset bypass
      # actor for when main is protected (docs/adr/0001 + infra runbook).
      - name: Mint release token (GitHub App)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: open-software-network
          # Both repos were renamed (os-scribe -> os-june, os-scribe-releases
          # -> os-june-releases); the token request rejects old names even
          # though the App installation follows renames.
          repositories: os-june,os-june-releases

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # Persist the App token so the later `git push origin main` (the
          # version-bump commit) is authenticated as the App, not GITHUB_TOKEN.
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      # NOTE: intentionally no `src-tauri/target` cache. A restored target lets
      # Cargo treat build.rs as fresh and skip it during the signed build — so
      # the nested Swift helper apps keep whatever signature they got the first
      # time they were built (ad-hoc, from `pnpm test:rust` which runs without a
      # signing identity) and notarization rejects them ("not signed with a valid
      # Developer ID / no secure timestamp / no hardened runtime"). A clean
      # compile forces build.rs to run under tauri-action's keychain + identity
      # and re-sign the helpers (`codesign --force --deep …` in build.rs).

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
          RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          PRODUCTION_OS_ACCOUNTS_URL: ${{ secrets.PRODUCTION_OS_ACCOUNTS_URL }}
          PRODUCTION_OS_ACCOUNTS_API_URL: ${{ secrets.PRODUCTION_OS_ACCOUNTS_API_URL }}
          PRODUCTION_OS_ACCOUNTS_CLIENT_ID: ${{ secrets.PRODUCTION_OS_ACCOUNTS_CLIENT_ID }}
          PRODUCTION_SCRIBE_API_URL: ${{ secrets.PRODUCTION_SCRIBE_API_URL }}
        run: |
          set -euo pipefail
          missing=0
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_API_ISSUER \
            APPLE_API_KEY \
            APPLE_API_KEY_P8 \
            TAURI_SIGNING_PRIVATE_KEY \
            RELEASE_APP_ID \
            RELEASE_APP_PRIVATE_KEY \
            PRODUCTION_OS_ACCOUNTS_URL \
            PRODUCTION_OS_ACCOUNTS_API_URL \
            PRODUCTION_OS_ACCOUNTS_CLIENT_ID \
            PRODUCTION_SCRIBE_API_URL
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} is required for a production auto-update release."
              missing=1
            fi
          done
          exit "$missing"

      - name: Validate release version input
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail
          # Reject leading zeros so this gate matches bump-version.mjs's VERSION_RE
          # exactly — invalid inputs fail here, not later with a murkier error.
          re='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
          if [[ ! "$VERSION_INPUT" =~ $re ]]; then
            echo "::error::Version must be semver X.Y.Z (no leading zeros), got: $VERSION_INPUT"
            exit 1
          fi
          # Stash the validated value. Every downstream step uses $VERSION (run:)
          # or env.VERSION (with:), never the raw ${{ inputs.version }} — so the
          # workflow_dispatch input can't reach a shell or action arg unsanitised
          # (command/arg injection). The bash =~ match is anchored against the
          # whole string, so an embedded newline fails the gate too.
          echo "VERSION=$VERSION_INPUT" >> "$GITHUB_ENV"

      - name: Bump release version
        run: |
          set -euo pipefail
          pnpm version:bump "$VERSION"
          cargo generate-lockfile --manifest-path src-tauri/Cargo.toml

      - name: Run release checks
        run: |
          set -euo pipefail
          pnpm lint
          pnpm test
          pnpm test:rust

      - name: Write Apple API key
        id: apple-api-key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$key_path"
          chmod 600 "$key_path"
          echo "path=$key_path" >> "$GITHUB_OUTPUT"

      # Import the Developer ID cert into a keychain BEFORE the build. build.rs
      # signs the nested Swift helper apps during `cargo build` (compile phase),
      # but tauri-action only sets up its signing keychain just before its own
      # bundler-signing phase, AFTER compilation. Without this, build.rs's
      # codesign fails ("helper app could not be signed") and the helpers reach
      # notarization ad-hoc (no Developer ID / secure timestamp / hardened
      # runtime). This mirrors scripts/build-signed-dmg.sh, which succeeds for
      # exactly this reason. tauri-action then reuses this keychain via
      # APPLE_SIGNING_IDENTITY, so we no longer hand it APPLE_CERTIFICATE (which
      # would set up a second, competing keychain).
      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          keychain="$RUNNER_TEMP/os-scribe-signing.keychain-db"
          keychain_password="os-scribe-$RANDOM-$RANDOM"
          cert="$RUNNER_TEMP/certificate.p12"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$cert"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$cert" -k "$keychain" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$keychain_password" "$keychain" >/dev/null
          # Prepend our keychain to the existing user search list. The command
          # substitution must word-split into one arg per keychain, so it stays
          # unquoted intentionally.
          # shellcheck disable=SC2046
          security list-keychains -d user -s "$keychain" \
            $(security list-keychains -d user | tr -d '"')
          rm -f "$cert"

      # Ship the Hermes runtime inside the app so first launch needs no
      # multi-minute GitHub download. Must run after the certificate import:
      # the script signs every Mach-O in the bundle (python, extension .so)
      # with the Developer ID + hardened runtime, which notarization requires.
      - name: Bundle Hermes runtime into app resources
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: ./scripts/bundle-hermes-runtime.sh

      - name: Build, sign, notarize, and publish updater release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ steps.apple-api-key.outputs.path }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          OS_ACCOUNTS_URL: ${{ secrets.PRODUCTION_OS_ACCOUNTS_URL }}
          OS_ACCOUNTS_API_URL: ${{ secrets.PRODUCTION_OS_ACCOUNTS_API_URL }}
          OS_ACCOUNTS_CLIENT_ID: ${{ secrets.PRODUCTION_OS_ACCOUNTS_CLIENT_ID }}
          SCRIBE_API_URL: ${{ secrets.PRODUCTION_SCRIBE_API_URL }}
        with:
          owner: open-software-network
          repo: os-june-releases
          tagName: v${{ env.VERSION }}
          releaseName: June v${{ env.VERSION }}
          releaseBody: "Stable June release v${{ env.VERSION }}."
          releaseCommitish: main
          # Plain notes only: the in-app update dialog renders latest.json's
          # `notes` as plain text, so GitHub's auto-generated markdown would show
          # raw (## headings, @-mentions). Keep notes = the plain releaseBody.
          generateReleaseNotes: false
          args: --bundles app,dmg --target aarch64-apple-darwin
          # v0.6.x input name (was uploadUpdaterJson/uploadUpdaterSignatures,
          # which this version ignores). Generates + uploads latest.json; the
          # .sig updater signatures are uploaded alongside it automatically.
          includeUpdaterJson: true

      - name: Upload stable macOS download alias
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/*.dmg
          )
          if [ "${#dmgs[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one production DMG, found ${#dmgs[@]}"
            printf 'DMG candidates:\n'
            if [ "${#dmgs[@]}" -eq 0 ]; then
              printf ' - <none>\n'
            else
              printf ' - %s\n' "${dmgs[@]}"
            fi
            exit 1
          fi
          stable_dmg="$RUNNER_TEMP/June_aarch64.dmg"
          cp "${dmgs[0]}" "$stable_dmg"
          gh release upload "v$VERSION" "$stable_dmg" \
            --repo open-software-network/os-june-releases \
            --clobber

      # Push the version bump to main only AFTER the release is published, so a
      # build/notarize failure never leaves an orphan `release:` commit on main
      # with no matching release. The push is authenticated as the release App
      # (token persisted by checkout above), so when main gets a ruleset, add
      # this App to the bypass actors and the push keeps working
      # (docs/adr/0001 + infra runbook).
      - name: Commit release version
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json
          git commit -m "release: v$VERSION"
          # Rebase onto anything that landed on main during the (~15 min) build so
          # the push isn't rejected non-fast-forward after the release is live.
          git pull --rebase origin main
          git push origin main

      - name: Summary
        run: |
          {
            echo "### Production macOS release"
            echo "- Version: \`$VERSION\`"
            echo "- Release repo: \`open-software-network/os-june-releases\`"
            echo "- Update manifest: \`https://github.com/open-software-network/os-june-releases/releases/latest/download/latest.json\`"
            echo "- Marketing download: \`https://github.com/open-software-network/os-june-releases/releases/latest/download/June_aarch64.dmg\`"
          } >> "$GITHUB_STEP_SUMMARY"
