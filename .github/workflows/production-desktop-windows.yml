name: production-desktop-windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Existing semver release to attach Windows assets to (for example 0.2.0)"
        required: true
        type: string
      publish:
        description: "Final publish: upload Windows assets and update latest.json"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-desktop-windows
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build production Windows app
    runs-on: windows-latest
    environment: production
    steps:
      - name: Mint release token (GitHub App)
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: open-software-network
          repositories: os-june,os-june-releases

      # Read which source commit the stable macOS release was built from (no
      # checkout needed yet) so Windows rebuilds that exact tree rather than
      # whatever main has since advanced to. Also validates the version input.
      - name: Resolve stable source commit
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if ($env:VERSION_INPUT -notmatch '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$') {
            throw "Version must be semver X.Y.Z with no leading zeros, got: $env:VERSION_INPUT"
          }

          $metaDir = Join-Path $env:RUNNER_TEMP "stable-meta"
          New-Item -ItemType Directory -Force -Path $metaDir | Out-Null
          gh release download "v$env:VERSION_INPUT" --repo open-software-network/os-june-releases --pattern "stable-build.json" --dir $metaDir
          if ($LASTEXITCODE -ne 0) {
            throw "Release v$env:VERSION_INPUT does not include stable-build.json. Promote the macOS release first, then attach Windows assets for the same version."
          }

          $meta = Get-Content -Raw (Join-Path $metaDir "stable-build.json") | ConvertFrom-Json
          if ($meta.version -ne $env:VERSION_INPUT) {
            throw "stable-build.json version is $($meta.version), expected $env:VERSION_INPUT."
          }
          if ($meta.commit -notmatch '^[0-9a-f]{40}$') {
            throw "stable-build.json commit is not a 40-char sha: $($meta.commit)"
          }

          "VERSION=$env:VERSION_INPUT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "STABLE_COMMIT=$($meta.commit)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The exact commit the promoted macOS release was built from, so the
          # Windows installer ships the same tested source under the same version.
          ref: ${{ env.STABLE_COMMIT }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: tauri-cargo-registry-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            tauri-cargo-registry-${{ runner.os }}-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Windows packaging and signing tools
        shell: pwsh
        run: |
          choco install nsis 7zip -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          $nugetVersion = "6.14.0"
          $nugetExpectedSha256 = "92DBED160DDEE0F64B901E907439E021211B428E57C089ECC12FC38DCC4BD9A5"
          $windowsSdkBuildToolsVersion = "10.0.28000.2270"
          $artifactSigningClientVersion = "1.0.128"

          $nuget = Join-Path $env:RUNNER_TEMP "nuget.exe"
          Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/v$nugetVersion/nuget.exe" -OutFile $nuget
          $nugetActualSha256 = (Get-FileHash -LiteralPath $nuget -Algorithm SHA256).Hash.ToUpperInvariant()
          if ($nugetActualSha256 -ne $nugetExpectedSha256) {
            throw "nuget.exe checksum mismatch. Expected $nugetExpectedSha256, got $nugetActualSha256."
          }

          $sdkRoot = Join-Path $env:RUNNER_TEMP "windows-sdk-build-tools"
          & $nuget install Microsoft.Windows.SDK.BuildTools -Version $windowsSdkBuildToolsVersion -x -OutputDirectory $sdkRoot
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to install Microsoft.Windows.SDK.BuildTools $windowsSdkBuildToolsVersion."
          }
          $signTool = Get-ChildItem -Path $sdkRoot -Filter "signtool.exe" -Recurse -File |
            Sort-Object `
              @{ Expression = { if ($_.FullName -match "\\x64\\signtool\.exe$") { 0 } else { 1 } } },
              FullName |
            Select-Object -First 1
          if ($null -eq $signTool) {
            throw "signtool.exe was not found in Microsoft.Windows.SDK.BuildTools."
          }
          "WINDOWS_SIGNTOOL_PATH=$($signTool.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $artifactClientRoot = Join-Path $env:RUNNER_TEMP "artifact-signing-client"
          & $nuget install Microsoft.ArtifactSigning.Client -Version $artifactSigningClientVersion -x -OutputDirectory $artifactClientRoot
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to install Microsoft.ArtifactSigning.Client $artifactSigningClientVersion."
          }
          $dlib = Get-ChildItem -Path $artifactClientRoot -Filter "Azure.CodeSigning.Dlib.dll" -Recurse -File |
            Sort-Object `
              @{ Expression = { if ($_.FullName -match "\\x64\\Azure\.CodeSigning\.Dlib\.dll$") { 0 } else { 1 } } },
              FullName |
            Select-Object -First 1
          if ($null -eq $dlib) {
            throw "Azure.CodeSigning.Dlib.dll was not found in Microsoft.ArtifactSigning.Client."
          }
          "ARTIFACT_SIGNING_DLIB_PATH=$($dlib.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Validate release secrets
        id: signing
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARTIFACT_SIGNING_ENDPOINT: ${{ secrets.ARTIFACT_SIGNING_ENDPOINT }}
          ARTIFACT_SIGNING_ACCOUNT_NAME: ${{ secrets.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
          RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          PRODUCTION_OS_ACCOUNTS_URL: ${{ secrets.PRODUCTION_OS_ACCOUNTS_URL }}
          PRODUCTION_OS_ACCOUNTS_API_URL: ${{ secrets.PRODUCTION_OS_ACCOUNTS_API_URL }}
          PRODUCTION_OS_ACCOUNTS_CLIENT_ID: ${{ secrets.PRODUCTION_OS_ACCOUNTS_CLIENT_ID }}
          PRODUCTION_JUNE_API_URL: ${{ secrets.PRODUCTION_JUNE_API_URL }}
        run: |
          $missing = 0
          $required = @(
            "TAURI_SIGNING_PRIVATE_KEY",
            "RELEASE_APP_ID",
            "RELEASE_APP_PRIVATE_KEY",
            "PRODUCTION_OS_ACCOUNTS_URL",
            "PRODUCTION_OS_ACCOUNTS_API_URL",
            "PRODUCTION_OS_ACCOUNTS_CLIENT_ID",
            "PRODUCTION_JUNE_API_URL"
          )

          foreach ($name in $required) {
            $value = [Environment]::GetEnvironmentVariable($name)
            if ([string]::IsNullOrWhiteSpace($value)) {
              Write-Host "::error::$name is required for a production Windows release."
              $missing = 1
            }
          }

          $pfxNames = @("WINDOWS_CERTIFICATE", "WINDOWS_CERTIFICATE_PASSWORD")
          $artifactNames = @(
            "AZURE_CLIENT_ID",
            "AZURE_TENANT_ID",
            "AZURE_SUBSCRIPTION_ID",
            "ARTIFACT_SIGNING_ENDPOINT",
            "ARTIFACT_SIGNING_ACCOUNT_NAME",
            "ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME"
          )
          $pfxPresent = @($pfxNames | Where-Object { ![string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_)) })
          $artifactPresent = @($artifactNames | Where-Object { ![string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_)) })

          if ($pfxPresent.Count -eq $pfxNames.Count -and $artifactPresent.Count -eq 0) {
            "WINDOWS_SIGNING_MODE=pfx" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "mode=pfx" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } elseif ($artifactPresent.Count -eq $artifactNames.Count -and $pfxPresent.Count -eq 0) {
            "WINDOWS_SIGNING_MODE=artifact" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "mode=artifact" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } elseif ($pfxPresent.Count -eq 0 -and $artifactPresent.Count -eq 0) {
            Write-Host "::error::No Windows Authenticode signing credentials are configured. Configure either WINDOWS_CERTIFICATE/WINDOWS_CERTIFICATE_PASSWORD or all Azure Artifact Signing secrets."
            $missing = 1
          } else {
            if ($pfxPresent.Count -eq $pfxNames.Count -and $artifactPresent.Count -eq $artifactNames.Count) {
              Write-Host "::error::Both PFX signing and Azure Artifact Signing are fully configured. Configure exactly one Windows Authenticode signing mode."
            } elseif ($pfxPresent.Count -gt 0 -and $pfxPresent.Count -lt $pfxNames.Count -and $artifactPresent.Count -eq 0) {
              $missingPfx = @($pfxNames | Where-Object { [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_)) })
              Write-Host "::error::PFX signing is partially configured. Missing: $($missingPfx -join ', ')."
            } elseif ($artifactPresent.Count -gt 0 -and $artifactPresent.Count -lt $artifactNames.Count -and $pfxPresent.Count -eq 0) {
              $missingArtifact = @($artifactNames | Where-Object { [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_)) })
              Write-Host "::error::Azure Artifact Signing is partially configured. Missing: $($missingArtifact -join ', ')."
            } else {
              Write-Host "::error::Windows Authenticode signing configuration mixes PFX and Azure Artifact Signing values. Configure exactly one complete signing mode."
            }
            $missing = 1
          }

          exit $missing

      - name: Azure login for Artifact Signing
        if: steps.signing.outputs.mode == 'artifact'
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Stamp clean release version
        shell: pwsh
        run: |
          # The checked-out commit still carries the RC's version files; stamp the
          # clean X.Y.Z so the Windows build matches the promoted macOS version.
          node scripts/set-build-version.mjs $env:VERSION
          cargo update --workspace --manifest-path src-tauri/Cargo.toml

      - name: Verify release exists
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release view "v$env:VERSION" --repo open-software-network/os-june-releases
          if ($LASTEXITCODE -ne 0) {
            throw "Release v$env:VERSION does not exist in open-software-network/os-june-releases."
          }

          $manifestDir = Join-Path $env:RUNNER_TEMP "release-manifest"
          New-Item -ItemType Directory -Force -Path $manifestDir | Out-Null
          gh release download "v$env:VERSION" --repo open-software-network/os-june-releases --pattern "latest.json" --dir $manifestDir
          if ($LASTEXITCODE -ne 0) {
            throw "Release v$env:VERSION does not include latest.json. Run the production macOS release before attaching Windows assets."
          }

          $manifestPath = Join-Path $manifestDir "latest.json"
          if (!(Test-Path -LiteralPath $manifestPath -PathType Leaf)) {
            throw "Downloaded latest.json was not found at $manifestPath."
          }
          "RELEASE_MANIFEST_PATH=$manifestPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Write Windows signing certificate
        if: steps.signing.outputs.mode == 'pfx'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "windows-signing.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          "WINDOWS_CERTIFICATE_PATH=$certificatePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run release checks
        run: |
          pnpm typecheck
          pnpm test

      - name: Bundle Hermes runtime into app resources
        shell: pwsh
        run: ./scripts/bundle-hermes-runtime-windows.ps1

      - name: Sign bundled Hermes runtime
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_SIGNING_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGNING_TIMESTAMP_URL }}
          ARTIFACT_SIGNING_ENDPOINT: ${{ secrets.ARTIFACT_SIGNING_ENDPOINT }}
          ARTIFACT_SIGNING_ACCOUNT_NAME: ${{ secrets.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
        run: |
          $binaries = Get-ChildItem ".tauri-hermes/hermes" -Recurse -File |
            Where-Object { $_.Extension -in @(".exe", ".dll", ".pyd") }
          if (($binaries | Measure-Object).Count -eq 0) {
            throw "Bundled Hermes runtime contains no Windows binaries to sign."
          }

          foreach ($binary in $binaries) {
            ./scripts/windows-sign.ps1 $binary.FullName
            $signature = Get-AuthenticodeSignature -FilePath $binary.FullName
            if ($signature.Status -ne "Valid") {
              throw "Bundled Hermes binary signature is $($signature.Status) for $($binary.FullName). $($signature.StatusMessage)"
            }
          }

      - name: Build production Windows installer
        env:
          OS_ACCOUNTS_URL: ${{ secrets.PRODUCTION_OS_ACCOUNTS_URL }}
          OS_ACCOUNTS_API_URL: ${{ secrets.PRODUCTION_OS_ACCOUNTS_API_URL }}
          OS_ACCOUNTS_CLIENT_ID: ${{ secrets.PRODUCTION_OS_ACCOUNTS_CLIENT_ID }}
          JUNE_API_URL: ${{ secrets.PRODUCTION_JUNE_API_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_SIGNING_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGNING_TIMESTAMP_URL }}
          ARTIFACT_SIGNING_ENDPOINT: ${{ secrets.ARTIFACT_SIGNING_ENDPOINT }}
          ARTIFACT_SIGNING_ACCOUNT_NAME: ${{ secrets.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
        run: pnpm tauri:build

      - name: Verify Windows signatures and payload
        shell: pwsh
        run: |
          $exe = Get-Item "src-tauri/target/release/os-june.exe" -ErrorAction Stop
          $setup = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" | Sort-Object LastWriteTimeUtc -Descending | Select-Object -First 1
          if ($null -eq $setup) {
            throw "NSIS setup.exe was not produced."
          }
          $setupSig = Get-Item "$($setup.FullName).sig" -ErrorAction Stop

          foreach ($file in @($exe, $setup)) {
            if ($file.Length -le 0) {
              throw "$($file.FullName) is empty."
            }
            $signature = Get-AuthenticodeSignature -FilePath $file.FullName
            if ($signature.Status -ne "Valid") {
              throw "Authenticode signature is $($signature.Status) for $($file.FullName). $($signature.StatusMessage)"
            }
          }

          if ([string]::IsNullOrWhiteSpace((Get-Content -Raw $setupSig.FullName))) {
            throw "$($setupSig.FullName) is empty."
          }

          $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
          if (!(Test-Path -LiteralPath $sevenZip -PathType Leaf)) {
            throw "7-Zip was not installed at $sevenZip."
          }

          $listing = & $sevenZip l $setup.FullName
          if ($LASTEXITCODE -ne 0) {
            throw "Could not inspect NSIS installer payload."
          }
          $listingText = ($listing -join "`n").Replace("\", "/")
          foreach ($expected in @("os-june.exe", "WebView2Loader.dll")) {
            if ($listingText -notmatch [regex]::Escape($expected)) {
              throw "NSIS installer payload does not include $expected."
            }
          }
          foreach ($expected in @("native/hermes/bin/hermes.exe", "native/hermes/python/current/python.exe", "native/hermes/hermes-agent/pyproject.toml")) {
            if ($listingText -notmatch [regex]::Escape($expected)) {
              throw "NSIS installer payload does not include bundled Hermes file $expected."
            }
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: june-windows-production-nsis-${{ github.sha }}
          path: src-tauri/target/release/bundle/nsis/*
          if-no-files-found: error

      - name: Publish Windows release assets
        if: inputs.publish
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $setup = Get-ChildItem $nsisDir -Filter "*-setup.exe" | Sort-Object LastWriteTimeUtc -Descending | Select-Object -First 1
          if ($null -eq $setup) {
            throw "NSIS setup.exe was not produced."
          }

          $setupSig = Get-Item "$($setup.FullName).sig" -ErrorAction Stop
          $stableSetup = Join-Path $env:RUNNER_TEMP "June_x64-setup.exe"
          $stableSetupSig = Join-Path $env:RUNNER_TEMP "June_x64-setup.exe.sig"
          Copy-Item -LiteralPath $setup.FullName -Destination $stableSetup -Force
          Copy-Item -LiteralPath $setupSig.FullName -Destination $stableSetupSig -Force

          $manifest = Get-Content -Raw $env:RELEASE_MANIFEST_PATH | ConvertFrom-Json
          if ($manifest.version -ne $env:VERSION -and $manifest.version -ne "v$env:VERSION") {
            throw "latest.json version is $($manifest.version), expected $env:VERSION."
          }
          if ($null -eq $manifest.platforms) {
            $manifest | Add-Member -MemberType NoteProperty -Name "platforms" -Value ([pscustomobject]@{})
          }

          $assetName = [System.Uri]::EscapeDataString($setup.Name)
          $assetUrl = "https://github.com/open-software-network/os-june-releases/releases/download/v$env:VERSION/$assetName"
          $signature = (Get-Content -Raw $setupSig.FullName).Trim()
          $manifest.platforms | Add-Member -Force -MemberType NoteProperty -Name "windows-x86_64" -Value ([pscustomobject]@{
            signature = $signature
            url = $assetUrl
          })

          $manifest | ConvertTo-Json -Depth 20 | Set-Content -Path $env:RELEASE_MANIFEST_PATH -Encoding utf8

          $assets = @(
            $setup.FullName,
            $setupSig.FullName,
            $stableSetup,
            $stableSetupSig,
            $env:RELEASE_MANIFEST_PATH
          )
          foreach ($asset in $assets) {
            gh release upload "v$env:VERSION" $asset --repo open-software-network/os-june-releases --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload $asset."
            }
          }

      - name: Summary
        shell: pwsh
        run: |
          @(
            "### Production Windows release",
            "- Version: ``$env:VERSION``",
            "- Release repo: ``open-software-network/os-june-releases``",
            "- Published release assets: ${{ inputs.publish && 'yes' || 'no, dry run only' }}",
            "- Marketing download: ``${{ inputs.publish && 'https://github.com/open-software-network/os-june-releases/releases/latest/download/June_x64-setup.exe' || 'not updated by this dry run' }}``",
            "- Windows updater platform: windows-x86_64"
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
