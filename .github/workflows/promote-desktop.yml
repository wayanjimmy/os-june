name: promote-desktop-release

# Promotes the current rc build to the stable update channel by REBUILDING at a
# clean X.Y.Z version (flavor B). It checks out the exact source commit the rc
# was built from (recorded in the rc release's rc-build.json), stamps the clean
# version, and runs the same sign + notarize + publish path as a production
# release. Stable therefore ships the same source you tested as the rc, with a
# clean version string. The rebuild needs the Apple + minisign secrets.
on:
  workflow_dispatch:
    inputs:
      rc-version:
        description: "RC version to promote (e.g. 0.0.25-rc.1). Must match the version the rc release currently holds."
        required: true
        type: string
      allow-non-main:
        description: "Emergency override: allow promotion when the RC source commit is not on main"
        required: true
        default: false
        type: boolean
      macos-runner:
        description: "Runner for the signed macOS build"
        required: true
        default: "mac-studio"
        type: choice
        options:
          - mac-studio
          - github-hosted

permissions:
  contents: write

concurrency:
  group: desktop-release-pipeline
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  extension-preflight:
    name: Verify extension is ready to promote
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    permissions:
      contents: read
      id-token: write
    outputs:
      extension_present: ${{ steps.rc.outputs.extension_present }}
      release_required: ${{ steps.rc.outputs.release_required }}
      store_version: ${{ steps.rc.outputs.store_version }}
      desktop_version: ${{ steps.rc.outputs.desktop_version }}
      source_commit: ${{ steps.rc.outputs.source_commit }}
    steps:
      - name: Mint release token (GitHub App)
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: open-software-network
          repositories: os-june,os-june-releases

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Freeze and verify RC release metadata
        id: rc
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RC_VERSION_INPUT: ${{ inputs.rc-version }}
        run: |
          set -euo pipefail
          dir="$RUNNER_TEMP/release-candidate"
          mkdir -p "$dir"
          gh release download rc \
            --repo open-software-network/os-june-releases \
            --pattern "rc-build.json" \
            --pattern "extension-build.json" \
            --dir "$dir"

          RC_DIR="$dir" node --input-type=module <<'NODE'
          import { appendFileSync, existsSync, readFileSync } from "node:fs";
          import { join } from "node:path";
          const desktop = JSON.parse(readFileSync(join(process.env.RC_DIR, "rc-build.json"), "utf8"));
          if (desktop.version !== process.env.RC_VERSION_INPUT) {
            throw new Error(
              `Requested ${process.env.RC_VERSION_INPUT}, but the RC release holds ${desktop.version}.`,
            );
          }
          if (!/^[0-9a-f]{40}$/.test(desktop.commit)) {
            throw new Error("rc-build.json has an invalid source commit.");
          }
          // An RC cut before the Chrome Web Store bootstrap carries no
          // extension metadata at all; that RC promotes desktop-only.
          const extensionPath = join(process.env.RC_DIR, "extension-build.json");
          const extension = existsSync(extensionPath)
            ? JSON.parse(readFileSync(extensionPath, "utf8"))
            : null;
          appendFileSync(
            process.env.GITHUB_OUTPUT,
            [
              `desktop_version=${desktop.version}`,
              `source_commit=${desktop.commit}`,
              `extension_present=${extension !== null}`,
              `release_required=${extension?.release?.required === true}`,
              `store_version=${extension?.extension?.version ?? "none"}`,
              "",
            ].join("\n"),
          );
          NODE

          if [ ! -f "$dir/extension-build.json" ]; then
            echo "::notice::The RC release carries no extension metadata; promoting desktop-only."
          else
            required="$(node -e 'const d=require(process.argv[1]);process.stdout.write(String(d.release.required))' "$dir/extension-build.json")"
            args=(
              verify-rc
              --metadata "$dir/extension-build.json"
              --desktop-version "$RC_VERSION_INPUT"
              --source-commit "$(node -e 'const d=require(process.argv[1]);process.stdout.write(d.commit)' "$dir/rc-build.json")"
            )
            if [ "$required" = "true" ]; then
              gh release download rc \
                --repo open-software-network/os-june-releases \
                --pattern "June-extension.zip" \
                --dir "$dir"
              args+=(--package "$dir/June-extension.zip")
            fi
            node scripts/extension-release.mjs "${args[@]}"
          fi

      - name: Require RC source commit on main
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SOURCE_COMMIT: ${{ steps.rc.outputs.source_commit }}
          ALLOW_NON_MAIN: ${{ inputs.allow-non-main }}
          TRIGGERED_BY: ${{ github.actor }}
        run: |
          set -euo pipefail
          compare_status="$(gh api \
            "repos/open-software-network/os-june/compare/${SOURCE_COMMIT}...main" \
            --jq .status)"
          if [ "$compare_status" = "ahead" ] || [ "$compare_status" = "identical" ]; then
            echo "RC source commit $SOURCE_COMMIT is an ancestor of main."
            exit 0
          fi

          if [ "$ALLOW_NON_MAIN" = "true" ]; then
            echo "::warning title=NON-MAIN RC PROMOTION::Emergency override enabled by $TRIGGERED_BY: $SOURCE_COMMIT is not an ancestor of main (compare status: $compare_status)."
            {
              echo "## ⚠️ Non-main RC promotion override"
              echo
              echo "- Source commit: \`$SOURCE_COMMIT\`"
              echo "- Compare status against \`main\`: \`$compare_status\`"
              echo "- Triggered by: \`$TRIGGERED_BY\`"
              echo "- Promotion is continuing because \`allow-non-main\` was enabled."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "::error title=RC source commit is not on main::$SOURCE_COMMIT is not an ancestor of main (compare status: $compare_status). Merge or backport it to main, then retry promotion."
          {
            echo "### Promotion blocked: RC source commit is not on main"
            echo
            echo "- Source commit: \`$SOURCE_COMMIT\`"
            echo "- Compare status against \`main\`: \`$compare_status\`"
            echo "- Merge or backport the RC source commit to \`main\`, then retry promotion."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      # Configuration is required exactly when the RC froze extension work:
      # promoting a correlated submission without store credentials would
      # publish the desktop and strand the extension. An RC with no extension
      # metadata (cut before the store bootstrap) promotes desktop-only and
      # needs no Web Store identity at all.
      - name: Validate Web Store identity configuration
        if: ${{ steps.rc.outputs.extension_present == 'true' }}
        env:
          WORKLOAD_IDENTITY_PROVIDER: ${{ vars.CHROME_WEB_STORE_WORKLOAD_IDENTITY_PROVIDER }}
          SERVICE_ACCOUNT: ${{ vars.CHROME_WEB_STORE_SERVICE_ACCOUNT }}
          PUBLISHER_ID: ${{ vars.CHROME_WEB_STORE_PUBLISHER_ID }}
          PENDING_REVIEW_HOLD: ${{ vars.CHROME_WEB_STORE_PENDING_REVIEW }}
        run: |
          set -euo pipefail
          # Manual hold: while the store bootstrap item is in Chrome review,
          # promoting an RC that froze extension work would touch the store
          # mid-review. Delete CHROME_WEB_STORE_PENDING_REVIEW to lift it.
          if [ -n "${PENDING_REVIEW_HOLD:-}" ]; then
            echo "::error::CHROME_WEB_STORE_PENDING_REVIEW is set; this RC carries an extension submission and cannot promote during the store-review hold: ${PENDING_REVIEW_HOLD}"
            exit 1
          fi
          missing=0
          for name in WORKLOAD_IDENTITY_PROVIDER SERVICE_ACCOUNT PUBLISHER_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} is required to promote an RC that carries an extension submission."
              missing=1
            fi
          done
          exit "$missing"

      - name: Authenticate to Google Cloud
        if: ${{ steps.rc.outputs.extension_present == 'true' }}
        id: google-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.CHROME_WEB_STORE_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CHROME_WEB_STORE_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Require reviewed package or verify unchanged state
        if: ${{ steps.rc.outputs.extension_present == 'true' }}
        env:
          CHROME_WEB_STORE_ACCESS_TOKEN: ${{ steps.google-auth.outputs.access_token }}
          CHROME_WEB_STORE_PUBLISHER_ID: ${{ vars.CHROME_WEB_STORE_PUBLISHER_ID }}
        run: |
          node scripts/chrome-web-store.mjs check-staged \
            --metadata "$RUNNER_TEMP/release-candidate/extension-build.json"

      - name: Preserve immutable RC inputs for promotion jobs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-extension-release-candidate
          path: ${{ runner.temp }}/release-candidate
          if-no-files-found: error
          overwrite: true
          retention-days: 30

  promote:
    name: Promote rc macOS app to stable
    needs: extension-preflight
    runs-on: ${{ fromJSON(inputs.macos-runner == 'mac-studio' && '["self-hosted","macOS","ARM64","desktop-release"]' || '["blacksmith-6vcpu-macos-15"]') }}
    environment: production
    steps:
      - name: Mint release token (GitHub App)
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: open-software-network
          # homebrew-tap: the tap cask bump below pushes as this same release
          # App, so the App must be installed on that repo too.
          repositories: os-june,os-june-releases,homebrew-tap

      - name: Download frozen RC metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: desktop-extension-release-candidate
          path: ${{ runner.temp }}/rc-meta

      # Read the rc build manifest first (no checkout needed) to learn which
      # version + source commit to promote, then check that commit out below.
      - name: Resolve rc version and source commit
        env:
          RC_VERSION_INPUT: ${{ inputs.rc-version }}
        run: |
          set -euo pipefail
          dir="$RUNNER_TEMP/rc-meta"

          rc_version="$(node -e 'const d=JSON.parse(require("node:fs").readFileSync(process.argv[1],"utf8"));process.stdout.write(String(d.version||""))' "$dir/rc-build.json")"
          commit="$(node -e 'const d=JSON.parse(require("node:fs").readFileSync(process.argv[1],"utf8"));process.stdout.write(String(d.commit||""))' "$dir/rc-build.json")"

          rc_re='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)-rc\.[1-9][0-9]*$'
          sha_re='^[0-9a-f]{40}$'
          if [[ ! "$rc_version" =~ $rc_re ]]; then
            echo "::error::rc-build.json version is not X.Y.Z-rc.N: $rc_version"
            exit 1
          fi
          if [[ ! "$commit" =~ $sha_re ]]; then
            echo "::error::rc-build.json commit is not a 40-char sha: $commit"
            exit 1
          fi
          # Q10: rc-version is required and must name the exact rc the release
          # currently holds, so a promote can never silently ship a different rc
          # than the operator intended.
          if [ "$RC_VERSION_INPUT" != "$rc_version" ]; then
            echo "::error::Requested $RC_VERSION_INPUT but the rc release holds $rc_version."
            exit 1
          fi

          # VERSION strips the -rc.N suffix for the clean stable version.
          {
            echo "RC_VERSION=$rc_version"
            echo "BUILD_COMMIT=$commit"
            echo "VERSION=${rc_version%-rc.*}"
          } >> "$GITHUB_ENV"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The exact commit the rc was built from, so stable rebuilds that tree.
          ref: ${{ env.BUILD_COMMIT }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      # The RC source commit can predate the local setup action, so load the
      # policy from the immutable commit that started this workflow.
      - name: Checkout package manager policy
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          path: .pnpm-policy

      - name: Setup pnpm
        uses: ./.pnpm-policy/.github/actions/setup-pnpm

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      # No src-tauri/target cache, same notarization rationale as the rc and
      # production workflows.

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          PRODUCTION_OS_ACCOUNTS_URL: ${{ secrets.PRODUCTION_OS_ACCOUNTS_URL }}
          PRODUCTION_OS_ACCOUNTS_API_URL: ${{ secrets.PRODUCTION_OS_ACCOUNTS_API_URL }}
          PRODUCTION_OS_ACCOUNTS_CLIENT_ID: ${{ secrets.PRODUCTION_OS_ACCOUNTS_CLIENT_ID }}
          PRODUCTION_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.PRODUCTION_GOOGLE_OAUTH_CLIENT_ID }}
          PRODUCTION_GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.PRODUCTION_GOOGLE_OAUTH_CLIENT_SECRET }}
          PRODUCTION_JUNE_API_URL: ${{ secrets.PRODUCTION_JUNE_API_URL }}
          PRODUCTION_LINEAR_OAUTH_CLIENT_ID: ${{ secrets.PRODUCTION_LINEAR_OAUTH_CLIENT_ID }}
        run: |
          set -euo pipefail
          missing=0
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_API_ISSUER \
            APPLE_API_KEY \
            APPLE_API_KEY_P8 \
            TAURI_SIGNING_PRIVATE_KEY \
            PRODUCTION_OS_ACCOUNTS_URL \
            PRODUCTION_OS_ACCOUNTS_API_URL \
            PRODUCTION_OS_ACCOUNTS_CLIENT_ID \
            PRODUCTION_GOOGLE_OAUTH_CLIENT_ID \
            PRODUCTION_GOOGLE_OAUTH_CLIENT_SECRET \
            PRODUCTION_JUNE_API_URL \
            PRODUCTION_LINEAR_OAUTH_CLIENT_ID
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} is required to promote a stable release."
              missing=1
            fi
          done
          exit "$missing"

      - name: Stamp clean stable version
        run: |
          set -euo pipefail
          # The rc already ran lint/test/test:rust at this exact commit, so the
          # only change here is the version string (rc -> clean); no need to
          # re-run the suite. set-build-version accepts the plain X.Y.Z too.
          node scripts/set-build-version.mjs "$VERSION"
          cargo update --workspace --manifest-path src-tauri/Cargo.toml

      - name: Generate release changelog
        run: |
          set -euo pipefail
          changelog_path="$RUNNER_TEMP/release-changelog.md"
          node scripts/generate-release-changelog.mjs "$VERSION" "$changelog_path"
          echo "RELEASE_CHANGELOG_PATH=$changelog_path" >> "$GITHUB_ENV"

      - name: Write Apple API key
        id: apple-api-key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$key_path"
          chmod 600 "$key_path"
          echo "path=$key_path" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          keychain="$RUNNER_TEMP/os-june-signing.keychain-db"
          keychain_password="os-june-$RANDOM-$RANDOM"
          cert="$RUNNER_TEMP/certificate.p12"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$cert"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$cert" -k "$keychain" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$keychain_password" "$keychain" >/dev/null
          # shellcheck disable=SC2046
          security list-keychains -d user -s "$keychain" \
            $(security list-keychains -d user | tr -d '"')
          rm -f "$cert"

      - name: Cache bundled Hermes runtime
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .tauri-hermes/hermes
          # v2 is the dual-runtime layout. Never restore a host-only v1 cache.
          key: hermes-bundle-macos-universal-v2-${{ runner.os }}-${{ hashFiles('scripts/bundle-hermes-runtime.sh', 'scripts/audit-hermes-runtime.sh', 'scripts/hermes-native-import-smoke.py', 'src-tauri/src/hermes_bridge.rs', 'src-tauri/src/hermes/apply_june_patches.py', 'src-tauri/src/hermes/sitecustomize.py') }}

      - name: Bundle Hermes runtime into app resources
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: ./scripts/bundle-hermes-runtime.sh

      - name: Prepare universal Computer use helper
        run: pnpm computer-use:prepare -- --release --target universal-apple-darwin

      - name: Build and sign stable app artifacts
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ steps.apple-api-key.outputs.path }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          OS_ACCOUNTS_URL: ${{ secrets.PRODUCTION_OS_ACCOUNTS_URL }}
          OS_ACCOUNTS_API_URL: ${{ secrets.PRODUCTION_OS_ACCOUNTS_API_URL }}
          OS_ACCOUNTS_CLIENT_ID: ${{ secrets.PRODUCTION_OS_ACCOUNTS_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.PRODUCTION_GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.PRODUCTION_GOOGLE_OAUTH_CLIENT_SECRET }}
          JUNE_API_URL: ${{ secrets.PRODUCTION_JUNE_API_URL }}
          LINEAR_OAUTH_CLIENT_ID: ${{ secrets.PRODUCTION_LINEAR_OAUTH_CLIENT_ID }}
          # Preserve the RC's first-run Auto behavior when it is promoted.
          OS_JUNE_AUTO_MODE_DEFAULT: "true"
        with:
          args: --bundles app,dmg --target universal-apple-darwin -- --locked
          includeUpdaterJson: false

      - name: Notarize, verify, and stage stable release assets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ steps.apple-api-key.outputs.path }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/*.dmg
          )
          if [ "${#dmgs[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one stable DMG, found ${#dmgs[@]}"
            exit 1
          fi

          apps=(
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/release/bundle/macos/*.app
          )
          if [ "${#apps[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one stable app bundle, found ${#apps[@]}"
            exit 1
          fi
          app="${apps[0]}"
          ./scripts/audit-hermes-runtime.sh \
            "$app/Contents/Resources/native/hermes" --require-signed
          codesign --verify --deep --strict --verbose=2 "$app"

          dmg="${dmgs[0]}"
          xcrun notarytool submit "$dmg" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$dmg"
          xcrun stapler validate "$dmg"
          spctl --assess --type install --verbose "$dmg"

          app_archives=(
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz
          )
          app_signatures=(
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          )
          if [ "${#app_archives[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one app updater archive, found ${#app_archives[@]}"
            exit 1
          fi
          if [ "${#app_signatures[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one app updater signature, found ${#app_signatures[@]}"
            exit 1
          fi

          release_dir="$RUNNER_TEMP/stable-release-assets"
          rm -rf "$release_dir"
          mkdir -p "$release_dir"
          stable_dmg="$release_dir/June_universal.dmg"
          legacy_dmg="$release_dir/June_aarch64.dmg"
          app_archive="$release_dir/June_universal.app.tar.gz"
          app_signature="$release_dir/June_universal.app.tar.gz.sig"
          latest_json="$release_dir/latest.json"
          cp "$dmg" "$stable_dmg"
          cp "$dmg" "$legacy_dmg"
          cp "${app_archives[0]}" "$app_archive"
          cp "${app_signatures[0]}" "$app_signature"

          stable_build_json="$release_dir/stable-build.json"

          SIGNATURE_PATH="$app_signature" \
          LATEST_JSON_PATH="$latest_json" \
          RELEASE_CHANGELOG_PATH="$RELEASE_CHANGELOG_PATH" \
          node <<'NODE'
          const fs = require("node:fs");
          const version = process.env.VERSION;
          const signature = fs.readFileSync(process.env.SIGNATURE_PATH, "utf8");
          const notes = fs
            .readFileSync(process.env.RELEASE_CHANGELOG_PATH, "utf8")
            .trim();
          const url = `https://github.com/open-software-network/os-june-releases/releases/download/v${version}/June_universal.app.tar.gz`;
          const platform = { signature, url };
          const latest = {
            version,
            notes,
            pub_date: new Date().toISOString(),
            platforms: {
              "darwin-aarch64": platform,
              "darwin-x86_64": platform,
              "darwin-aarch64-app": platform,
              "darwin-x86_64-app": platform,
            },
          };
          fs.writeFileSync(
            process.env.LATEST_JSON_PATH,
            `${JSON.stringify(latest, null, 2)}\n`,
          );
          NODE

          # Record both the source commit and every stable asset digest. The
          # digest file is also passed to later jobs as an immutable Actions
          # artifact, so Homebrew never trusts mutable release bytes alone.
          node scripts/stable-release-provenance.mjs write \
            --dir "$release_dir" \
            --version "$VERSION" \
            --source-commit "$BUILD_COMMIT" \
            --output "$stable_build_json"

          release_notes_file="${RELEASE_CHANGELOG_PATH:?}"

          download_stable_assets() {
            local destination="$1"
            rm -rf "$destination"
            mkdir -p "$destination"
            gh release download "v$VERSION" \
              --repo open-software-network/os-june-releases \
              --pattern "June_universal.dmg" \
              --pattern "June_aarch64.dmg" \
              --pattern "June_universal.app.tar.gz" \
              --pattern "June_universal.app.tar.gz.sig" \
              --pattern "latest.json" \
              --pattern "stable-build.json" \
              --dir "$destination"
          }

          verify_stable_assets() {
            local release_dir="$1"
            local trusted_metadata="$2"
            cmp "$release_dir/stable-build.json" "$trusted_metadata"
            node scripts/stable-release-provenance.mjs verify \
              --dir "$release_dir" \
              --version "$VERSION" \
              --source-commit "$BUILD_COMMIT" \
              --metadata "$trusted_metadata"
          }

          release_state="missing"
          if gh release view "v$VERSION" \
            --repo open-software-network/os-june-releases >/dev/null 2>&1; then
            release_state="$(gh release view "v$VERSION" \
              --repo open-software-network/os-june-releases \
              --json isDraft --jq 'if .isDraft then "draft" else "published" end')"
          fi

          if [ "$release_state" = "published" ]; then
            echo "::error::Release v$VERSION is already public. Rerun the original failed publication job so it can use the immutable provenance from that workflow run."
            exit 1
          fi

          if [ "$release_state" = "draft" ]; then
            gh release edit "v$VERSION" \
              --repo open-software-network/os-june-releases \
              --title "June v$VERSION" \
              --notes-file "$release_notes_file" \
              --draft \
              --prerelease=false
          else
            gh release create "v$VERSION" \
              --repo open-software-network/os-june-releases \
              --title "June v$VERSION" \
              --notes-file "$release_notes_file" \
              --draft \
              --latest=false \
              --target main
          fi

          # A retried draft may contain a partial or obsolete asset set. Clear
          # it before uploading so only the six provenance-bound files can
          # cross the publication boundary.
          while IFS= read -r asset_name; do
            [ -n "$asset_name" ] || continue
            gh release delete-asset "v$VERSION" "$asset_name" \
              --repo open-software-network/os-june-releases \
              --yes
          done < <(gh release view "v$VERSION" \
            --repo open-software-network/os-june-releases \
            --json assets --jq '.assets[].name')

          gh release upload "v$VERSION" \
            "$stable_dmg" \
            "$legacy_dmg" \
            "$app_archive" \
            "$app_signature" \
            "$latest_json" \
            "$stable_build_json" \
            --repo open-software-network/os-june-releases \
            --clobber

          uploaded_dir="$RUNNER_TEMP/uploaded-stable-release"
          download_stable_assets "$uploaded_dir"
          verify_stable_assets "$uploaded_dir" "$stable_build_json"

      - name: Preserve immutable desktop release provenance
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stable-desktop-release-provenance
          path: ${{ runner.temp }}/stable-release-assets/stable-build.json
          if-no-files-found: error
          overwrite: true
          retention-days: 30

  publish-desktop:
    name: Publish verified desktop release
    needs: [extension-preflight, promote]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    permissions:
      contents: read
    steps:
      - name: Mint release token (GitHub App)
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: open-software-network
          repositories: os-june,os-june-releases

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.extension-preflight.outputs.source_commit }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Download immutable desktop release provenance
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: stable-desktop-release-provenance
          path: ${{ runner.temp }}/stable-release-provenance

      - name: Verify and publish desktop release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RC_VERSION: ${{ needs.extension-preflight.outputs.desktop_version }}
          BUILD_COMMIT: ${{ needs.extension-preflight.outputs.source_commit }}
        run: |
          set -euo pipefail
          version="${RC_VERSION%-rc.*}"
          release_dir="$RUNNER_TEMP/stable-release-assets"
          mkdir -p "$release_dir"
          gh release download "v$version" \
            --repo open-software-network/os-june-releases \
            --pattern "June_universal.dmg" \
            --pattern "June_aarch64.dmg" \
            --pattern "June_universal.app.tar.gz" \
            --pattern "June_universal.app.tar.gz.sig" \
            --pattern "latest.json" \
            --pattern "stable-build.json" \
            --dir "$release_dir"

          trusted_metadata="$RUNNER_TEMP/stable-release-provenance/stable-build.json"
          expected_assets="$(printf '%s\n' \
            June_aarch64.dmg \
            June_universal.app.tar.gz \
            June_universal.app.tar.gz.sig \
            June_universal.dmg \
            latest.json \
            stable-build.json)"
          actual_assets="$(gh release view "v$version" \
            --repo open-software-network/os-june-releases \
            --json assets --jq '.assets[].name' | sort)"
          if [ "$actual_assets" != "$expected_assets" ]; then
            echo "::error::Stable release asset set differs from the frozen publication contract."
            diff <(printf '%s\n' "$expected_assets") <(printf '%s\n' "$actual_assets") || true
            exit 1
          fi
          cmp "$release_dir/stable-build.json" "$trusted_metadata"
          node scripts/stable-release-provenance.mjs verify \
            --dir "$release_dir" \
            --version "$version" \
            --source-commit "$BUILD_COMMIT" \
            --metadata "$trusted_metadata"

          release_state="$(gh release view "v$version" \
            --repo open-software-network/os-june-releases \
            --json isDraft --jq 'if .isDraft then "draft" else "published" end')"
          if [ "$release_state" = "published" ]; then
            echo "Release v$version is already public with the exact frozen assets."
            exit 0
          fi

          # Publishing is the desktop boundary. Until this final operation,
          # partial asset failures remain invisible in a draft release.
          gh release edit "v$version" \
            --repo open-software-network/os-june-releases \
            --draft=false \
            --prerelease=false \
            --latest

  extension-stable:
    name: Publish reviewed extension to stable
    # Skipped by design when the promoted RC carries no extension metadata
    # (cut before the Chrome Web Store bootstrap); post-release tells this
    # apart from an upstream failure via extension_present.
    if: ${{ success() && needs.extension-preflight.outputs.extension_present == 'true' }}
    needs: [extension-preflight, publish-desktop]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Mint release token (GitHub App)
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: open-software-network
          repositories: os-june,os-june-releases

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Download frozen RC metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: desktop-extension-release-candidate
          path: ${{ runner.temp }}/release-candidate

      - name: Authenticate to Google Cloud
        id: google-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.CHROME_WEB_STORE_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CHROME_WEB_STORE_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Publish staged extension or recheck unchanged state
        env:
          CHROME_WEB_STORE_ACCESS_TOKEN: ${{ steps.google-auth.outputs.access_token }}
          CHROME_WEB_STORE_PUBLISHER_ID: ${{ vars.CHROME_WEB_STORE_PUBLISHER_ID }}
        run: |
          node scripts/chrome-web-store.mjs promote \
            --metadata "$RUNNER_TEMP/release-candidate/extension-build.json"

      - name: Write stable extension metadata
        env:
          VERSION: ${{ needs.extension-preflight.outputs.desktop_version }}
          BUILD_COMMIT: ${{ needs.extension-preflight.outputs.source_commit }}
        run: |
          set -euo pipefail
          stable_version="${VERSION%-rc.*}"
          node scripts/extension-release.mjs write-stable \
            --metadata "$RUNNER_TEMP/release-candidate/extension-build.json" \
            --desktop-version "$stable_version" \
            --source-commit "$BUILD_COMMIT" \
            --output "$RUNNER_TEMP/release-candidate/stable-extension-build.json"

      - name: Attach extension assets to stable release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RC_VERSION: ${{ needs.extension-preflight.outputs.desktop_version }}
          RELEASE_REQUIRED: ${{ needs.extension-preflight.outputs.release_required }}
        run: |
          set -euo pipefail
          version="${RC_VERSION%-rc.*}"
          dir="$RUNNER_TEMP/release-candidate"
          cp "$dir/stable-extension-build.json" "$dir/extension-build.json"
          gh release upload "v$version" "$dir/extension-build.json" \
            --repo open-software-network/os-june-releases \
            --clobber
          if [ "$RELEASE_REQUIRED" = "true" ]; then
            gh release upload "v$version" "$dir/June-extension.zip" \
              --repo open-software-network/os-june-releases \
              --clobber
          fi

      - name: Summary
        run: |
          {
            echo "### Extension stable release"
            echo "- Store version: \`${{ needs.extension-preflight.outputs.store_version }}\`"
            if [ "${{ needs.extension-preflight.outputs.release_required }}" = "true" ]; then
              echo "- Result: published the exact Chrome-reviewed RC package."
            else
              echo "- Result: unchanged bytes reverified against live store state."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  post-release:
    name: Finish desktop release bookkeeping
    # Runs after a fully published release. extension-stable may be skipped,
    # but only by design (the RC carried no extension); a skip caused by an
    # upstream failure never satisfies this condition because publish-desktop
    # success is required explicitly.
    if: ${{ !cancelled()
      && needs.extension-preflight.result == 'success'
      && needs.promote.result == 'success'
      && needs.publish-desktop.result == 'success'
      && (needs.extension-stable.result == 'success'
        || (needs.extension-stable.result == 'skipped'
          && needs.extension-preflight.outputs.extension_present != 'true')) }}
    needs: [extension-preflight, promote, publish-desktop, extension-stable]
    runs-on: ${{ fromJSON(inputs.macos-runner == 'mac-studio' && '["self-hosted","macOS","ARM64","desktop-release"]' || '["blacksmith-6vcpu-macos-15"]') }}
    environment: production
    steps:
      - name: Mint release token (GitHub App)
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: open-software-network
          repositories: os-june,os-june-releases,homebrew-tap

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.extension-preflight.outputs.source_commit }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Download immutable desktop release provenance
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: stable-desktop-release-provenance
          path: ${{ runner.temp }}/stable-release-provenance

      - name: Resolve and verify stable release assets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RC_VERSION: ${{ needs.extension-preflight.outputs.desktop_version }}
          BUILD_COMMIT: ${{ needs.extension-preflight.outputs.source_commit }}
        run: |
          set -euo pipefail
          version="${RC_VERSION%-rc.*}"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          release_dir="$RUNNER_TEMP/stable-release-assets"
          mkdir -p "$release_dir"
          gh release download "v$version" \
            --repo open-software-network/os-june-releases \
            --pattern "June_universal.dmg" \
            --pattern "June_aarch64.dmg" \
            --pattern "June_universal.app.tar.gz" \
            --pattern "June_universal.app.tar.gz.sig" \
            --pattern "latest.json" \
            --dir "$release_dir"
          node scripts/stable-release-provenance.mjs verify \
            --dir "$release_dir" \
            --version "$version" \
            --source-commit "$BUILD_COMMIT" \
            --metadata "$RUNNER_TEMP/stable-release-provenance/stable-build.json"

      # Keep the org tap cask (open-software-network/homebrew-tap, Casks/june.rb)
      # pointing at the stable DMG. This job runs only after the correlated
      # extension publication succeeds, so bookkeeping cannot suppress it.
      - name: Bump Homebrew tap cask
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          dmg="$RUNNER_TEMP/stable-release-assets/June_universal.dmg"
          sha="$(shasum -a 256 "$dmg" | awk '{print $1}')"

          tap_dir="$RUNNER_TEMP/homebrew-tap"
          rm -rf "$tap_dir"
          git clone --depth 1 \
            "https://x-access-token:${TOKEN}@github.com/open-software-network/homebrew-tap.git" \
            "$tap_dir"
          cask="$tap_dir/Casks/june.rb"

          current_version="$(sed -n 's/^  version "\(.*\)"$/\1/p' "$cask")"
          current_sha="$(sed -n 's/^  sha256 "\(.*\)"$/\1/p' "$cask")"
          if [ -z "$current_version" ] || [ -z "$current_sha" ]; then
            echo "::error::Casks/june.rb is missing the expected version/sha256 lines."
            exit 1
          fi
          if [ "$current_version" = "$VERSION" ] && [ "$current_sha" = "$sha" ]; then
            echo "Tap cask already at v$VERSION with matching sha256; nothing to bump."
          else
            sed -i '' \
              -e "s/^  version \".*\"\$/  version \"$VERSION\"/" \
              -e "s/^  sha256 \".*\"\$/  sha256 \"$sha\"/" \
              "$cask"
            grep -Fqx "  version \"$VERSION\"" "$cask"
            grep -Fqx "  sha256 \"$sha\"" "$cask"
            git -C "$tap_dir" config user.name "github-actions[bot]"
            git -C "$tap_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git -C "$tap_dir" add "$cask"
            git -C "$tap_dir" commit -m "june v$VERSION"
            git -C "$tap_dir" push origin HEAD:main
          fi

      - name: Record released version on main
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          bot_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${bot_id}+${APP_SLUG}[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard
            git checkout -B main origin/main
            current="$(node -e 'process.stdout.write(require("./package.json").version)')"
            if [ "$current" = "$VERSION" ]; then
              echo "main is already at v$VERSION; nothing to record."
              exit 0
            fi
            pnpm version:bump "$VERSION"
            cargo update --workspace --manifest-path src-tauri/Cargo.toml
            git add package.json pnpm-lock.yaml src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json
            git commit -m "release: v$VERSION"
            if git push origin HEAD:main; then
              echo "Recorded release: v$VERSION on main."
              exit 0
            fi
            echo "::warning::Push to main was rejected (it advanced); retrying ($attempt/5)."
          done
          echo "::error::Could not record release: v$VERSION on main after 5 attempts."
          exit 1

      # Release announcements are handled by the org's GitHub Slack app
      # (`/github subscribe open-software-network/os-june-releases releases`).
      - name: Summary
        env:
          RC_VERSION: ${{ needs.extension-preflight.outputs.desktop_version }}
          BUILD_COMMIT: ${{ needs.extension-preflight.outputs.source_commit }}
        run: |
          {
            echo "### Promoted rc to stable"
            echo "- Promoted: \`$RC_VERSION\` -> \`v$VERSION\` (rebuilt from \`$BUILD_COMMIT\`)"
            echo "- Stable manifest: \`https://github.com/open-software-network/os-june-releases/releases/latest/download/latest.json\`"
          } >> "$GITHUB_STEP_SUMMARY"
