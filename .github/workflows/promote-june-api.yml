name: promote-june-api

on:
  workflow_dispatch:
    inputs:
      from-tag:
        description: Source tag to promote. Use `staging` for normal release or a short SHA for rollback.
        required: false
        default: staging
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: promote-june-api
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/june-api

jobs:
  verify:
    name: Verify source image
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      from-tag: ${{ steps.validate.outputs.from-tag }}
    env:
      FROM_TAG: ${{ inputs.from-tag }}
    steps:
      - name: Validate source tag
        id: validate
        run: |
          set -euo pipefail
          if [[ "$FROM_TAG" != "staging" && ! "$FROM_TAG" =~ ^[0-9a-f]{7,40}$ ]]; then
            echo "::error::from-tag must be 'staging' or a 7-40 character lowercase hex commit SHA tag."
            exit 1
          fi
          echo "from-tag=${FROM_TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@ab5c1da94f53f5cd75c1038092aa276dddfccbba # v1.9.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify source image exists
        run: |
          set -euo pipefail
          image="${{ env.IMAGE }}:${FROM_TAG}"
          if ! docker buildx imagetools inspect "$image" --raw > /dev/null 2>&1; then
            echo "::error::Image $image was not found in GHCR. Build the staging image first, then rerun promotion."
            exit 1
          fi
          echo "Found $image"

  deploy:
    name: Deploy to production
    needs: verify
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    permissions:
      contents: write # push the digest-record git tag
      packages: write # retag :production
    env:
      FROM_TAG: ${{ needs.verify.outputs.from-tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@ab5c1da94f53f5cd75c1038092aa276dddfccbba # v1.9.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve digest and commit SHA
        id: image
        run: |
          set -euo pipefail
          source="${{ env.IMAGE }}:${FROM_TAG}"

          digest=$(docker buildx imagetools inspect "$source" \
            --format '{{ json .Manifest }}' | jq -r '.digest')
          if [[ -z "$digest" || "$digest" == "null" ]]; then
            echo "::error::Could not resolve manifest digest for $source."
            exit 1
          fi

          rev=$(docker buildx imagetools inspect "$source" --format '{{json .Image}}' \
            | jq -r 'first(.. | objects | select(.config?.Labels?["org.opencontainers.image.revision"] != null) | .config.Labels["org.opencontainers.image.revision"]) // empty')

          if [[ -z "$rev" && "$FROM_TAG" =~ ^[0-9a-f]{7,40}$ ]]; then
            rev="$FROM_TAG"
          fi

          if [[ -z "$rev" ]]; then
            echo "::error::Could not resolve commit SHA for $source. Use an image built by this repository, or pass a SHA tag directly."
            exit 1
          fi

          sha_short="${rev:0:7}"
          echo "sha_short=${sha_short}" >> "$GITHUB_OUTPUT"
          echo "full_sha=${rev}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Resolved $source → digest=${digest} sha=${sha_short}"

      # NOTE: from-tag re-pins only the june-api APP image; the compose file
      # (incl. the dstack-ingress pin and env) always deploys from this
      # workflow's checkout ref. Rolling back a bad compose/ingress change
      # therefore means reverting it on main and rerunning promote — promoting
      # an older app SHA alone redeploys the same compose.
      - id: phala
        uses: ./.github/actions/phala-deploy
        with:
          cvm-name: os-june-api-production
          compose-file: june-api/deploy/docker-compose.production.yml
          # Pin by per-commit tag, not @digest: dstack's GHCR prelaunch verify
          # mangles repo@sha256:digest refs (cuts at the ':' in sha256:) → 404 →
          # CVM never boots. The sha_short tag is resolved above and pullable.
          image-ref: ${{ env.IMAGE }}:${{ steps.image.outputs.sha_short }}
          api-key: ${{ secrets.PHALA_CLOUD_API_KEY }}

      # Staging exercises the same ingress stack before promote, but production
      # must still pass its own public endpoint check before accepting the
      # promote: a broken production ingress boot would otherwise surface via
      # the 30-minute watchdog. Runs before the retag/record steps so a
      # failure fails the promotion and leaves :production on the last-good
      # digest. Deeper checks (e.g. body-size probes after an ingress change)
      # are run manually against the public endpoint.
      - name: Verify public endpoint after deploy
        if: steps.phala.outputs.deployed == 'true'
        run: |
          set -euo pipefail
          base="https://june-api.opensoftware.co"
          # The CVM restarts its containers on update; give the ingress up to
          # 10 minutes to come back before judging the deploy.
          code=""
          for _ in $(seq 1 60); do
            # `|| true`, not `|| echo`: curl prints its own %{http_code} (000)
            # on transport failure, so a fallback echo would corrupt the value.
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$base/healthz" || true)
            [[ "$code" == "200" ]] && break
            sleep 10
          done
          if [[ "$code" != "200" ]]; then
            echo "::error::$base/healthz did not return 200 within 10 minutes of the promote (last: $code)."
            exit 1
          fi
          echo "healthz OK"

      - name: Retag digest as :production
        if: steps.phala.outputs.deployed == 'true'
        run: |
          set -euo pipefail
          target="${{ env.IMAGE }}:production"
          docker buildx imagetools create --tag "$target" "${{ env.IMAGE }}@${{ steps.image.outputs.digest }}"
          echo "Retagged ${{ env.IMAGE }}@${{ steps.image.outputs.digest }} as $target"

      # Anchor "b": in-repo immutable record that <sha> deployed digest <D>.
      - name: Record deployed digest
        if: steps.phala.outputs.deployed == 'true'
        env:
          DIGEST: ${{ steps.image.outputs.digest }}
          IMG: ${{ env.IMAGE }}:${{ steps.image.outputs.sha_short }}
          SHA_SHORT: ${{ steps.image.outputs.sha_short }}
          FULL_SHA: ${{ steps.image.outputs.full_sha }}
        run: |
          set -euo pipefail
          tag="deploy/production/${SHA_SHORT}"
          # Tag the promoted image's SOURCE commit (full_sha), not the workflow
          # checkout (a workflow_dispatch checks out the dispatch ref, not the
          # source). Create-once so the record stays immutable; fetch the source
          # commit since the checkout is shallow. Non-fatal — a record failure
          # must not fail an already-successful promotion.
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag \`${tag}\` already recorded; left unchanged." >> "$GITHUB_STEP_SUMMARY"
          elif git fetch --depth=1 origin "${FULL_SHA}" 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" "${FULL_SHA}" -m "production deploy: ${IMG} = ${DIGEST} (commit ${FULL_SHA})"
            git push origin "refs/tags/${tag}"
            echo "Recorded \`${tag}\` → \`${DIGEST}\` @ \`${FULL_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Could not fetch source commit ${FULL_SHA}; skipped digest record for ${tag}."
          fi
