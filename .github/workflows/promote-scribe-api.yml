name: promote-scribe-api

on:
  workflow_dispatch:
    inputs:
      from-tag:
        description: Source tag to promote. Use `staging` for normal release or a short SHA for rollback.
        required: false
        default: staging
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: promote-scribe-api
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/scribe-api

jobs:
  verify:
    name: Verify source image
    runs-on: ubuntu-latest
    env:
      FROM_TAG: ${{ inputs.from-tag }}
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify source image exists
        run: |
          set -euo pipefail
          image="${{ env.IMAGE }}:${FROM_TAG}"
          if ! docker buildx imagetools inspect "$image" --raw > /dev/null 2>&1; then
            echo "::error::Image $image was not found in GHCR. Build the staging image first, then rerun promotion."
            exit 1
          fi
          echo "Found $image"

  deploy:
    name: Deploy to production
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write # push the digest-record git tag
      packages: write # retag :production
    env:
      FROM_TAG: ${{ inputs.from-tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve digest and commit SHA
        id: image
        run: |
          set -euo pipefail
          source="${{ env.IMAGE }}:${FROM_TAG}"

          digest=$(docker buildx imagetools inspect "$source" \
            --format '{{ json .Manifest }}' | jq -r '.digest')
          if [[ -z "$digest" || "$digest" == "null" ]]; then
            echo "::error::Could not resolve manifest digest for $source."
            exit 1
          fi

          rev=$(docker buildx imagetools inspect "$source" --format '{{json .Image}}' \
            | jq -r 'first(.. | objects | select(.config?.Labels?["org.opencontainers.image.revision"] != null) | .config.Labels["org.opencontainers.image.revision"]) // empty')

          if [[ -z "$rev" && "$FROM_TAG" =~ ^[0-9a-f]{7,40}$ ]]; then
            rev="$FROM_TAG"
          fi

          if [[ -z "$rev" ]]; then
            echo "::error::Could not resolve commit SHA for $source. Use an image built by this repository, or pass a SHA tag directly."
            exit 1
          fi

          sha_short="${rev:0:7}"
          echo "sha_short=${sha_short}" >> "$GITHUB_OUTPUT"
          echo "full_sha=${rev}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Resolved $source → digest=${digest} sha=${sha_short}"

      - id: phala
        uses: ./.github/actions/phala-deploy
        with:
          cvm-name: os-scribe-api-production
          compose-file: scribe-api/deploy/docker-compose.production.yml
          # Pin by per-commit tag, not @digest: dstack's GHCR prelaunch verify
          # mangles repo@sha256:digest refs (cuts at the ':' in sha256:) → 404 →
          # CVM never boots. The sha_short tag is resolved above and pullable.
          image-ref: ${{ env.IMAGE }}:${{ steps.image.outputs.sha_short }}
          api-key: ${{ secrets.PHALA_CLOUD_API_KEY }}

      - name: Retag digest as :production
        if: steps.phala.outputs.deployed == 'true'
        run: |
          set -euo pipefail
          target="${{ env.IMAGE }}:production"
          docker buildx imagetools create --tag "$target" "${{ env.IMAGE }}@${{ steps.image.outputs.digest }}"
          echo "Retagged ${{ env.IMAGE }}@${{ steps.image.outputs.digest }} as $target"

      # Anchor "b": in-repo immutable record that <sha> deployed digest <D>.
      - name: Record deployed digest
        if: steps.phala.outputs.deployed == 'true'
        env:
          DIGEST: ${{ steps.image.outputs.digest }}
          IMG: ${{ env.IMAGE }}:${{ steps.image.outputs.sha_short }}
          SHA_SHORT: ${{ steps.image.outputs.sha_short }}
          FULL_SHA: ${{ steps.image.outputs.full_sha }}
        run: |
          set -euo pipefail
          tag="deploy/production/${SHA_SHORT}"
          # Tag the promoted image's SOURCE commit (full_sha), not the workflow
          # checkout (a workflow_dispatch checks out the dispatch ref, not the
          # source). Create-once so the record stays immutable; fetch the source
          # commit since the checkout is shallow. Non-fatal — a record failure
          # must not fail an already-successful promotion.
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag \`${tag}\` already recorded; left unchanged." >> "$GITHUB_STEP_SUMMARY"
          elif git fetch --depth=1 origin "${FULL_SHA}" 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" "${FULL_SHA}" -m "production deploy: ${IMG} = ${DIGEST} (commit ${FULL_SHA})"
            git push origin "refs/tags/${tag}"
            echo "Recorded \`${tag}\` → \`${DIGEST}\` @ \`${FULL_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Could not fetch source commit ${FULL_SHA}; skipped digest record for ${tag}."
          fi
