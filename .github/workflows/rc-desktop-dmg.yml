name: rc-desktop-release

# Builds a signed + notarized universal macOS app for the `rc` update channel,
# on demand. The artifact version is X.Y.Z-rc.N (prerelease semver, so the
# updater orders rc.1 < rc.2 < ... < X.Y.Z). Assets publish to a FIXED `rc`
# release tag in os-june-releases with stable filenames, so the channel URL
# (releases/download/rc/latest-rc.json) never moves. promote-desktop.yml later
# republishes the exact same notarized bytes to the stable channel.
on:
  workflow_dispatch:
    inputs:
      base-version:
        description: "Base semver this RC targets (for example 0.0.25)"
        required: true
        type: string
      rc-number:
        description: "RC iteration number (1, 2, ...)"
        required: true
        default: "1"
        type: string
      macos-runner:
        description: "Runner for the signed macOS build"
        required: true
        default: "mac-studio"
        type: choice
        options:
          - mac-studio
          - github-hosted

permissions:
  contents: write

concurrency:
  group: desktop-release-pipeline
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Release rc macOS app
    runs-on: ${{ fromJSON(inputs.macos-runner == 'mac-studio' && '["self-hosted","macOS","ARM64","desktop-release"]' || '["blacksmith-6vcpu-macos-15"]') }}
    environment: production
    steps:
      # Same release App identity as production: it publishes to os-june-releases.
      - name: Mint release token (GitHub App)
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: open-software-network
          repositories: os-june,os-june-releases

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Build the exact ref selected for workflow_dispatch. This permits a
          # signed pre-merge release candidate while keeping BUILD_COMMIT tied
          # to the tree testers actually ran.
          ref: ${{ github.sha }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Warn when building rc away from main
        if: ${{ github.ref != 'refs/heads/main' }}
        run: |
          set -euo pipefail
          echo "::warning title=RC BUILD FROM NON-MAIN REF::Building an RC from $GITHUB_REF at $GITHUB_SHA. This is allowed for firefights, but stable promotion will require the source commit on main or an emergency override."
          {
            echo "### ⚠️ RC built from a non-main ref"
            echo
            echo "- Dispatched ref: \`$GITHUB_REF\`"
            echo "- Source commit: \`$GITHUB_SHA\`"
            echo "- This is allowed for firefights. Stable promotion requires this commit on \`main\` unless \`allow-non-main\` is enabled."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      # No src-tauri/target cache, for the same notarization reason as the
      # production workflow: a restored target skips build.rs and leaves the
      # nested Swift helpers ad-hoc-signed, which notarization rejects.

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
          RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          PRODUCTION_OS_ACCOUNTS_URL: ${{ secrets.PRODUCTION_OS_ACCOUNTS_URL }}
          PRODUCTION_OS_ACCOUNTS_API_URL: ${{ secrets.PRODUCTION_OS_ACCOUNTS_API_URL }}
          PRODUCTION_OS_ACCOUNTS_CLIENT_ID: ${{ secrets.PRODUCTION_OS_ACCOUNTS_CLIENT_ID }}
          PRODUCTION_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.PRODUCTION_GOOGLE_OAUTH_CLIENT_ID }}
          PRODUCTION_GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.PRODUCTION_GOOGLE_OAUTH_CLIENT_SECRET }}
          PRODUCTION_JUNE_API_URL: ${{ secrets.PRODUCTION_JUNE_API_URL }}
          PRODUCTION_LINEAR_OAUTH_CLIENT_ID: ${{ secrets.PRODUCTION_LINEAR_OAUTH_CLIENT_ID }}
        run: |
          set -euo pipefail
          missing=0
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_API_ISSUER \
            APPLE_API_KEY \
            APPLE_API_KEY_P8 \
            TAURI_SIGNING_PRIVATE_KEY \
            RELEASE_APP_ID \
            RELEASE_APP_PRIVATE_KEY \
            PRODUCTION_OS_ACCOUNTS_URL \
            PRODUCTION_OS_ACCOUNTS_API_URL \
            PRODUCTION_OS_ACCOUNTS_CLIENT_ID \
            PRODUCTION_GOOGLE_OAUTH_CLIENT_ID \
            PRODUCTION_GOOGLE_OAUTH_CLIENT_SECRET \
            PRODUCTION_JUNE_API_URL \
            PRODUCTION_LINEAR_OAUTH_CLIENT_ID
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} is required for an rc auto-update release."
              missing=1
            fi
          done
          exit "$missing"

      - name: Validate and compose rc version
        env:
          BASE_VERSION_INPUT: ${{ inputs.base-version }}
          RC_NUMBER_INPUT: ${{ inputs.rc-number }}
        run: |
          set -euo pipefail
          # Same anchored, leading-zero-rejecting gates as the production
          # workflow so a workflow_dispatch input can't reach a shell/arg
          # unsanitised. Downstream steps only read $VERSION, never the raw input.
          base_re='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
          rc_re='^[1-9][0-9]*$'
          if [[ ! "$BASE_VERSION_INPUT" =~ $base_re ]]; then
            echo "::error::Base version must be semver X.Y.Z (no leading zeros), got: $BASE_VERSION_INPUT"
            exit 1
          fi
          if [[ ! "$RC_NUMBER_INPUT" =~ $rc_re ]]; then
            echo "::error::RC number must be a positive integer (no leading zeros), got: $RC_NUMBER_INPUT"
            exit 1
          fi
          # Q9: an rc must target a version ahead of what main already ships, so it
          # can only ever be promoted forward. main is the checked-out ref, so its
          # package.json is the current released version. Reuse bump-version's
          # compareSemver for the same ordering the version-bump gate uses.
          node --input-type=module <<'NODE'
          import { appendFileSync, readFileSync } from "node:fs";
          import {
            compareSemver,
            currentVersionFromPackageJson,
          } from "./scripts/bump-version.mjs";
          const base = process.env.BASE_VERSION_INPUT;
          const main = currentVersionFromPackageJson(
            readFileSync("package.json", "utf8"),
          );
          if (compareSemver(base, main) <= 0) {
            console.error(
              `::error::Base version ${base} must be greater than main's current version ${main}; an rc can only target an unreleased version.`,
            );
            process.exit(1);
          }
          console.log(`Base version ${base} is ahead of main (${main}).`);
          NODE
          # Chrome accepts one to four numeric components, each at most 65535.
          # Validate the correlated extension build before spending macOS runner
          # time on a desktop RC that could never reach the Web Store.
          node scripts/extension-release.mjs validate-version \
            --desktop-version "${BASE_VERSION_INPUT}-rc.${RC_NUMBER_INPUT}"
          echo "VERSION=${BASE_VERSION_INPUT}-rc.${RC_NUMBER_INPUT}" >> "$GITHUB_ENV"
          # Record the exact source commit so promote-desktop.yml can rebuild the
          # clean X.Y.Z from this same tree (only the version string differs).
          echo "BUILD_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Guard rc version advances the channel
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          # The publish step clobbers latest-rc.json + rc-build.json under the fixed
          # `rc` URL, and the updater is forward-only. A rerun with a non-increasing
          # rc version would strand testers already on the higher version and leave
          # rc-build.json (which promote trusts) pointing at bytes they never ran.
          # Require the composed version to strictly exceed the current rc release.
          dir="$RUNNER_TEMP/rc-guard"
          rm -rf "$dir"
          mkdir -p "$dir"
          lookup_error=""
          if lookup_error=$(gh api --silent \
            repos/open-software-network/os-june-releases/releases/tags/rc 2>&1); then
            gh release download rc \
              --repo open-software-network/os-june-releases \
              --pattern "rc-build.json" --dir "$dir"
          elif grep -q 'HTTP 404' <<< "$lookup_error"; then
            echo "No existing rc release was found."
          else
            echo "::error::Could not determine the current rc release; refusing to publish without the forward-only guard."
            printf '%s\n' "$lookup_error" >&2
            exit 1
          fi
          RC_GUARD_DIR="$dir" node --input-type=module <<'NODE'
          import { existsSync, readFileSync } from "node:fs";
          import { join } from "node:path";
          import { compareBuildVersion } from "./scripts/set-build-version.mjs";
          const path = join(process.env.RC_GUARD_DIR, "rc-build.json");
          const next = process.env.VERSION;
          if (!existsSync(path)) {
            console.log(`No existing rc release; ${next} is the first candidate.`);
            process.exit(0);
          }
          const current = JSON.parse(readFileSync(path, "utf8")).version;
          if (compareBuildVersion(next, current) <= 0) {
            console.error(
              `::error::rc version ${next} must be greater than the current rc release ${current}; bump rc-number (the rc channel is forward-only).`,
            );
            process.exit(1);
          }
          console.log(`rc version ${next} advances the channel (current ${current}).`);
          NODE

      - name: Stamp rc build version
        run: |
          set -euo pipefail
          # Sets X.Y.Z-rc.N into the three version files for this build only.
          # NOT committed — rc versions are ephemeral and sort below their base.
          node scripts/set-build-version.mjs "$VERSION"
          cargo update --workspace --manifest-path src-tauri/Cargo.toml

      - name: Run release checks
        run: |
          set -euo pipefail
          pnpm typecheck
          pnpm test
          pnpm test:rust

      - name: Generate rc release notes
        run: |
          set -euo pipefail
          notes_path="$RUNNER_TEMP/rc-notes.md"
          # Same automated changelog as the production release: commits since the
          # last `release: vX.Y.Z` on main. The rc version only sets the title.
          node scripts/generate-release-changelog.mjs "$VERSION" "$notes_path"
          echo "RC_NOTES_PATH=$notes_path" >> "$GITHUB_ENV"

      - name: Write Apple API key
        id: apple-api-key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$key_path"
          chmod 600 "$key_path"
          echo "path=$key_path" >> "$GITHUB_OUTPUT"

      # Import the Developer ID cert before the build so build.rs can sign the
      # nested Swift helpers with a secure timestamp + hardened runtime (same
      # rationale as the production workflow).
      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          keychain="$RUNNER_TEMP/os-june-signing.keychain-db"
          keychain_password="os-june-$RANDOM-$RANDOM"
          cert="$RUNNER_TEMP/certificate.p12"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$cert"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$cert" -k "$keychain" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$keychain_password" "$keychain" >/dev/null
          # shellcheck disable=SC2046
          security list-keychains -d user -s "$keychain" \
            $(security list-keychains -d user | tr -d '"')
          rm -f "$cert"

      - name: Cache bundled Hermes runtime
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .tauri-hermes/hermes
          # v2 is the dual-runtime layout. Never restore a host-only v1 cache.
          key: hermes-bundle-macos-universal-v2-${{ runner.os }}-${{ hashFiles('scripts/bundle-hermes-runtime.sh', 'scripts/audit-hermes-runtime.sh', 'scripts/hermes-native-import-smoke.py', 'src-tauri/src/hermes_bridge.rs', 'src-tauri/src/hermes/apply_june_patches.py', 'src-tauri/src/hermes/sitecustomize.py') }}

      - name: Bundle Hermes runtime into app resources
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: ./scripts/bundle-hermes-runtime.sh

      - name: Prepare universal Computer use helper
        run: pnpm computer-use:prepare -- --release --target universal-apple-darwin

      - name: Build and sign rc app artifacts
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ steps.apple-api-key.outputs.path }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          OS_ACCOUNTS_URL: ${{ secrets.PRODUCTION_OS_ACCOUNTS_URL }}
          OS_ACCOUNTS_API_URL: ${{ secrets.PRODUCTION_OS_ACCOUNTS_API_URL }}
          OS_ACCOUNTS_CLIENT_ID: ${{ secrets.PRODUCTION_OS_ACCOUNTS_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.PRODUCTION_GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.PRODUCTION_GOOGLE_OAUTH_CLIENT_SECRET }}
          JUNE_API_URL: ${{ secrets.PRODUCTION_JUNE_API_URL }}
          LINEAR_OAUTH_CLIENT_ID: ${{ secrets.PRODUCTION_LINEAR_OAUTH_CLIENT_ID }}
          # New installs start in Auto at its default Higher Quality preference.
          OS_JUNE_AUTO_MODE_DEFAULT: "true"
        with:
          args: --bundles app,dmg --target universal-apple-darwin -- --locked
          # The DMG is notarized after the build, so don't let tauri-action
          # publish anything itself.
          includeUpdaterJson: false

      - name: Notarize, verify, and publish rc release assets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ steps.apple-api-key.outputs.path }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/*.dmg
          )
          if [ "${#dmgs[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one rc DMG, found ${#dmgs[@]}"
            printf 'DMG candidates:\n'
            if [ "${#dmgs[@]}" -eq 0 ]; then
              printf ' - <none>\n'
            else
              printf ' - %s\n' "${dmgs[@]}"
            fi
            exit 1
          fi

          apps=(
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/release/bundle/macos/*.app
          )
          if [ "${#apps[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one rc app bundle, found ${#apps[@]}"
            exit 1
          fi
          app="${apps[0]}"
          ./scripts/audit-hermes-runtime.sh \
            "$app/Contents/Resources/native/hermes" --require-signed
          codesign --verify --deep --strict --verbose=2 "$app"

          dmg="${dmgs[0]}"
          xcrun notarytool submit "$dmg" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$dmg"
          xcrun stapler validate "$dmg"
          spctl --assess --type install --verbose "$dmg"

          app_archives=(
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz
          )
          app_signatures=(
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          )
          if [ "${#app_archives[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one app updater archive, found ${#app_archives[@]}"
            exit 1
          fi
          if [ "${#app_signatures[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one app updater signature, found ${#app_signatures[@]}"
            exit 1
          fi

          release_dir="$RUNNER_TEMP/rc-release-assets"
          rm -rf "$release_dir"
          mkdir -p "$release_dir"
          stable_dmg="$release_dir/June_universal.dmg"
          versioned_dmg="$release_dir/June_v${VERSION}_universal.dmg"
          app_archive="$release_dir/June_universal.app.tar.gz"
          app_signature="$release_dir/June_universal.app.tar.gz.sig"
          latest_rc_json="$release_dir/latest-rc.json"
          cp "$dmg" "$stable_dmg"
          cp "$dmg" "$versioned_dmg"
          cp "${app_archives[0]}" "$app_archive"
          cp "${app_signatures[0]}" "$app_signature"

          # rc-build.json records the source commit so promote-desktop.yml can
          # rebuild the clean X.Y.Z from this exact tree.
          rc_build_json="$release_dir/rc-build.json"
          printf '{\n  "version": "%s",\n  "commit": "%s"\n}\n' \
            "$VERSION" "$BUILD_COMMIT" > "$rc_build_json"

          # Stable filenames + the fixed `rc` tag keep the manifest and asset URLs
          # constant across rc builds, so the app's RC_ENDPOINT never moves.
          SIGNATURE_PATH="$app_signature" \
          LATEST_JSON_PATH="$latest_rc_json" \
          NOTES_PATH="$RC_NOTES_PATH" \
          node <<'NODE'
          const fs = require("node:fs");
          const version = process.env.VERSION;
          const signature = fs.readFileSync(process.env.SIGNATURE_PATH, "utf8");
          const notes = fs.readFileSync(process.env.NOTES_PATH, "utf8").trim();
          const url =
            "https://github.com/open-software-network/os-june-releases/releases/download/rc/June_universal.app.tar.gz";
          const platform = { signature, url };
          const latest = {
            version,
            notes,
            pub_date: new Date().toISOString(),
            platforms: {
              "darwin-aarch64": platform,
              "darwin-x86_64": platform,
              "darwin-aarch64-app": platform,
              "darwin-x86_64-app": platform,
            },
          };
          fs.writeFileSync(
            process.env.LATEST_JSON_PATH,
            `${JSON.stringify(latest, null, 2)}\n`,
          );
          NODE

          notes_file="${RC_NOTES_PATH:?}"
          if gh release view rc --repo open-software-network/os-june-releases >/dev/null 2>&1; then
            gh release edit rc \
              --repo open-software-network/os-june-releases \
              --title "June v$VERSION (rc)" \
              --prerelease \
              --notes-file "$notes_file"
          else
            gh release create rc \
              --repo open-software-network/os-june-releases \
              --title "June v$VERSION (rc)" \
              --prerelease \
              --notes-file "$notes_file" \
              --target main
          fi

          # The candidate-specific DMG is append-only: an existing name means
          # this version was already attempted and must never be replaced.
          gh release upload rc "$versioned_dmg" \
            --repo open-software-network/os-june-releases

          # Fixed RC release channel assets intentionally follow the newest candidate.
          gh release upload rc \
            "$stable_dmg" \
            "$app_archive" \
            "$app_signature" \
            "$latest_rc_json" \
            "$rc_build_json" \
            --repo open-software-network/os-june-releases \
            --clobber

      - name: Notify Slack about rc build
        if: ${{ success() }}
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL secret is not configured; skipping Slack notification."
            echo "- Slack notification: skipped (SLACK_WEBHOOK_URL is not configured)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          payload_file="$RUNNER_TEMP/rc-slack-payload.json"
          SLACK_PAYLOAD_PATH="$payload_file" node <<'NODE'
          const fs = require("node:fs");

          const version = process.env.VERSION;
          const commit = process.env.BUILD_COMMIT;
          const shortCommit = commit.slice(0, 7);
          const releaseUrl =
            "https://github.com/open-software-network/os-june-releases/releases/tag/rc";
          const downloadUrl =
            `https://github.com/open-software-network/os-june-releases/releases/download/rc/June_v${version}_universal.dmg`;
          const commitUrl = `https://github.com/open-software-network/os-june/commit/${commit}`;

          const payload = {
            text: `June v${version} release candidate is ready for testing`,
            blocks: [
              {
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: `:test_tube: *June v${version} release candidate is ready for testing*`,
                },
              },
              {
                type: "section",
                fields: [
                  {
                    type: "mrkdwn",
                    text: `*Version:*\nv${version}`,
                  },
                  {
                    type: "mrkdwn",
                    text: `*Source:*\n<${commitUrl}|${shortCommit}>`,
                  },
                ],
              },
              {
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: `*Download:*\n<${downloadUrl}|macOS DMG (Apple Silicon and Intel)>`,
                },
              },
              {
                type: "actions",
                elements: [
                  {
                    type: "button",
                    text: {
                      type: "plain_text",
                      text: "View release candidate",
                    },
                    url: releaseUrl,
                  },
                ],
              },
            ],
          };

          fs.writeFileSync(
            process.env.SLACK_PAYLOAD_PATH,
            `${JSON.stringify(payload)}\n`,
          );
          NODE

          response=$(curl -sS -f -X POST \
            --connect-timeout 5 \
            --max-time 20 \
            -H "Content-Type: application/json" \
            --data-binary "@$payload_file" \
            "$SLACK_WEBHOOK_URL" 2>&1) || {
            echo "::warning::Slack notification failed or delivery could not be confirmed: $response"
            echo "- Slack notification: delivery unconfirmed (check Slack before posting manually)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          }
          echo "Slack notification sent successfully."
          echo "- Slack notification: sent for v$VERSION" >> "$GITHUB_STEP_SUMMARY"

      - name: Summary
        run: |
          {
            echo "### rc macOS release"
            echo "- Version: \`$VERSION\`"
            echo "- Channel manifest: \`https://github.com/open-software-network/os-june-releases/releases/download/rc/latest-rc.json\`"
            echo "- Promote to stable: run \`promote-desktop.yml\`"
          } >> "$GITHUB_STEP_SUMMARY"

  extension-rc:
    name: Submit extension release candidate
    needs: release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Mint release token (GitHub App)
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: open-software-network
          repositories: os-june,os-june-releases

      - name: Resolve the published desktop RC
        id: rc
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          EXPECTED_VERSION: ${{ format('{0}-rc.{1}', inputs.base-version, inputs.rc-number) }}
        run: |
          set -euo pipefail
          dir="$RUNNER_TEMP/extension-rc-meta"
          mkdir -p "$dir"
          gh release download rc \
            --repo open-software-network/os-june-releases \
            --pattern "rc-build.json" \
            --dir "$dir"
          RC_META_DIR="$dir" node --input-type=module <<'NODE'
          import { appendFileSync, readFileSync } from "node:fs";
          import { join } from "node:path";
          const metadata = JSON.parse(
            readFileSync(join(process.env.RC_META_DIR, "rc-build.json"), "utf8"),
          );
          if (metadata.version !== process.env.EXPECTED_VERSION) {
            throw new Error(
              `Desktop RC release holds ${metadata.version}; expected ${process.env.EXPECTED_VERSION}.`,
            );
          }
          if (!/^[0-9a-f]{40}$/.test(metadata.commit)) {
            throw new Error("Desktop RC metadata has an invalid source commit.");
          }
          const output = process.env.GITHUB_OUTPUT;
          appendFileSync(output, `version=${metadata.version}\ncommit=${metadata.commit}\n`);
          NODE

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.rc.outputs.commit }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Test and build extension
        run: |
          set -euo pipefail
          pnpm --filter june-extension typecheck
          pnpm --filter june-extension test
          pnpm extension:build

      - name: Download prior extension release metadata
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          prior="$RUNNER_TEMP/extension-prior"
          mkdir -p "$prior/rc" "$prior/stable"

          rc_assets="$(gh release view rc \
            --repo open-software-network/os-june-releases \
            --json assets --jq '.assets[].name')"
          if grep -Fqx "extension-build.json" <<< "$rc_assets"; then
            gh release download rc \
              --repo open-software-network/os-june-releases \
              --pattern "extension-build.json" \
              --dir "$prior/rc"
          fi
          if grep -Fqx "June-extension.zip" <<< "$rc_assets"; then
            gh release download rc \
              --repo open-software-network/os-june-releases \
              --pattern "June-extension.zip" \
              --dir "$prior/rc"
          fi

          stable_tag="$(gh release view \
            --repo open-software-network/os-june-releases \
            --json tagName --jq .tagName)"
          stable_assets="$(gh release view "$stable_tag" \
            --repo open-software-network/os-june-releases \
            --json assets --jq '.assets[].name')"
          if grep -Fqx "extension-build.json" <<< "$stable_assets"; then
            gh release download "$stable_tag" \
              --repo open-software-network/os-june-releases \
              --pattern "extension-build.json" \
              --dir "$prior/stable"
          fi

      # Missing Web Store identity configuration is a clean skip, not a
      # failure: the desktop RC is already published when this job runs, so
      # failing here would leave a half-released RC. Until the one-time store
      # bootstrap in docs/release-extension.md is complete, RCs are
      # desktop-only by design.
      - name: Detect Web Store identity configuration
        id: store-config
        env:
          WORKLOAD_IDENTITY_PROVIDER: ${{ vars.CHROME_WEB_STORE_WORKLOAD_IDENTITY_PROVIDER }}
          SERVICE_ACCOUNT: ${{ vars.CHROME_WEB_STORE_SERVICE_ACCOUNT }}
          PUBLISHER_ID: ${{ vars.CHROME_WEB_STORE_PUBLISHER_ID }}
          PENDING_REVIEW_HOLD: ${{ vars.CHROME_WEB_STORE_PENDING_REVIEW }}
        run: |
          set -euo pipefail
          configured=true
          # Manual hold: while the store bootstrap item is in Chrome review,
          # CHROME_WEB_STORE_PENDING_REVIEW keeps RCs desktop-only without
          # removing the identity variables. Delete the variable to lift it.
          if [ -n "${PENDING_REVIEW_HOLD:-}" ]; then
            echo "::notice::CHROME_WEB_STORE_PENDING_REVIEW is set; extension store submission is on hold: ${PENDING_REVIEW_HOLD}"
            configured=false
          fi
          for name in WORKLOAD_IDENTITY_PROVIDER SERVICE_ACCOUNT PUBLISHER_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::notice::CHROME_WEB_STORE ${name} is not configured; skipping extension store submission for this RC."
              configured=false
            fi
          done
          echo "configured=$configured" >> "$GITHUB_OUTPUT"

      # A skipped RC must not leave a previous RC's extension assets on the
      # fixed rc release: stable promotion correlates those assets with the
      # desktop RC being promoted, and stale metadata would either block the
      # promotion or promote bytes this RC never built.
      - name: Remove stale extension assets from the RC release
        if: ${{ steps.store-config.outputs.configured != 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          assets="$(gh release view rc \
            --repo open-software-network/os-june-releases \
            --json assets --jq '.assets[].name')"
          for asset in extension-build.json June-extension.zip; do
            if grep -Fqx "$asset" <<< "$assets"; then
              gh release delete-asset rc "$asset" \
                --repo open-software-network/os-june-releases \
                --yes
              echo "::notice::Removed stale $asset from the rc release; this RC carries no extension."
            fi
          done
          {
            echo "### Extension release candidate"
            echo "- Desktop RC: \`${{ steps.rc.outputs.version }}\`"
            echo "- Result: skipped, Chrome Web Store identity is not configured."
            echo "- This RC promotes desktop-only; see docs/release-extension.md for the store bootstrap."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Authenticate to Google Cloud
        if: ${{ steps.store-config.outputs.configured == 'true' }}
        id: google-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.CHROME_WEB_STORE_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CHROME_WEB_STORE_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Inspect prior extension submission
        if: ${{ steps.store-config.outputs.configured == 'true' }}
        id: prior-store
        env:
          CHROME_WEB_STORE_ACCESS_TOKEN: ${{ steps.google-auth.outputs.access_token }}
          CHROME_WEB_STORE_PUBLISHER_ID: ${{ vars.CHROME_WEB_STORE_PUBLISHER_ID }}
        run: |
          set -euo pipefail
          metadata="$RUNNER_TEMP/extension-prior/rc/extension-build.json"
          reusable=false
          if [ -f "$metadata" ]; then
            reusable="$(node scripts/chrome-web-store.mjs reuse-status --metadata "$metadata")"
          fi
          echo "reusable=$reusable" >> "$GITHUB_OUTPUT"

      - name: Prepare correlated extension package
        if: ${{ steps.store-config.outputs.configured == 'true' }}
        id: extension
        env:
          DESKTOP_VERSION: ${{ steps.rc.outputs.version }}
          SOURCE_COMMIT: ${{ steps.rc.outputs.commit }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/extension-release"
          prior="$RUNNER_TEMP/extension-prior"
          args=(
            prepare
            --desktop-version "$DESKTOP_VERSION"
            --source-commit "$SOURCE_COMMIT"
            --output-dir "$output"
          )
          if [ -f "$prior/stable/extension-build.json" ]; then
            args+=(--previous-stable-metadata "$prior/stable/extension-build.json")
          fi
          if [ -f "$prior/rc/extension-build.json" ]; then
            args+=(--previous-rc-metadata "$prior/rc/extension-build.json")
          fi
          if [ -f "$prior/rc/June-extension.zip" ]; then
            args+=(--previous-rc-package "$prior/rc/June-extension.zip")
          fi
          if [ "${{ steps.prior-store.outputs.reusable }}" = "true" ]; then
            args+=(--reuse-previous-rc true)
          fi
          node scripts/extension-release.mjs "${args[@]}"

      - name: Submit extension for review or verify unchanged state
        if: ${{ steps.store-config.outputs.configured == 'true' }}
        env:
          CHROME_WEB_STORE_ACCESS_TOKEN: ${{ steps.google-auth.outputs.access_token }}
          CHROME_WEB_STORE_PUBLISHER_ID: ${{ vars.CHROME_WEB_STORE_PUBLISHER_ID }}
        run: |
          set -euo pipefail
          args=(submit --metadata "${{ steps.extension.outputs.metadata_path }}")
          if [ "${{ steps.extension.outputs.release_required }}" = "true" ]; then
            args+=(--package "${{ steps.extension.outputs.package_path }}")
          fi
          node scripts/chrome-web-store.mjs "${args[@]}"

      - name: Publish extension RC assets
        if: ${{ steps.store-config.outputs.configured == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_REQUIRED: ${{ steps.extension.outputs.release_required }}
        run: |
          set -euo pipefail
          metadata="${{ steps.extension.outputs.metadata_path }}"
          if [ "$RELEASE_REQUIRED" = "true" ]; then
            gh release upload rc "${{ steps.extension.outputs.package_path }}" \
              --repo open-software-network/os-june-releases \
              --clobber
          elif gh release view rc \
            --repo open-software-network/os-june-releases \
            --json assets --jq '.assets[].name' | grep -Fqx "June-extension.zip"; then
            gh release delete-asset rc "June-extension.zip" \
              --repo open-software-network/os-june-releases \
              --yes
          fi
          # Metadata is the commit marker. Publishing it last means promotion
          # never trusts a package upload that did not complete.
          gh release upload rc "$metadata" \
            --repo open-software-network/os-june-releases \
            --clobber

      - name: Summary
        if: ${{ steps.store-config.outputs.configured == 'true' }}
        run: |
          {
            echo "### Extension release candidate"
            echo "- Desktop RC: \`${{ steps.rc.outputs.version }}\`"
            echo "- Store version: \`${{ steps.extension.outputs.store_version }}\`"
            echo "- Result: \`${{ steps.extension.outputs.release_reason }}\`"
            if [ "${{ steps.extension.outputs.release_required }}" = "true" ]; then
              echo "- Stable promotion is blocked until Chrome reports \`STAGED\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
