name: scribe-api

on:
  pull_request:
    paths:
      - "scribe-api/**"
      - ".github/workflows/scribe-api.yml"
      - ".github/actions/setup-rust/**"
      - ".github/actions/changed-paths/**"
  push:
    branches: [main]
    paths:
      - "scribe-api/**"
      - ".github/workflows/scribe-api.yml"
      - ".github/actions/setup-rust/**"
      - ".github/actions/changed-paths/**"

permissions:
  contents: read

concurrency:
  group: scribe-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust
      - name: cargo fmt
        working-directory: scribe-api
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust
      - name: cargo clippy
        working-directory: scribe-api
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust
      - name: cargo test
        working-directory: scribe-api
        env:
          RUST_BACKTRACE: 1
        run: cargo test --all-targets --all-features --locked

  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: cargo llvm-cov
        working-directory: scribe-api
        env:
          RUST_BACKTRACE: 1
        run: cargo llvm-cov --workspace --all-features --html --output-dir target/llvm-cov/html
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: scribe-api-rust-coverage
          path: scribe-api/target/llvm-cov/html
          if-no-files-found: error
