name: scribe-api

on:
  pull_request:
    paths:
      - "scribe-api/**"
      - ".github/workflows/scribe-api.yml"
      - ".github/actions/setup-rust/**"
  push:
    branches: [main]
    paths:
      - "scribe-api/**"
      - ".github/workflows/scribe-api.yml"
      - ".github/actions/setup-rust/**"

permissions:
  contents: read

concurrency:
  group: scribe-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust
      - name: cargo fmt
        working-directory: scribe-api
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust
      - name: cargo clippy
        working-directory: scribe-api
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust
      - name: cargo test
        working-directory: scribe-api
        env:
          RUST_BACKTRACE: 1
        run: cargo test --all-targets --all-features --locked

# The coverage rerun of this suite lives in coverage.yml (manual-only): it
# rebuilt and reran everything `test` already ran, gated nothing
# (continue-on-error), and produced an artifact nothing downloads.
