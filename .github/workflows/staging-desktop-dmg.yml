name: staging-desktop-dmg

# Manual-only: a signed + notarized staging DMG costs a long macOS runner job
# and an Apple notarization round-trip per merge, and back-to-back merges just
# cancelled each other's builds anyway. Dispatch it from the Actions tab (or
# `gh workflow run staging-desktop-dmg.yml`) when a staging artifact is needed.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-desktop-dmg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build staging macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Cache cargo target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: src-tauri/target
          key: tauri-target-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            tauri-target-${{ runner.os }}-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate staging DMG secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          STAGING_OS_ACCOUNTS_URL: ${{ secrets.STAGING_OS_ACCOUNTS_URL }}
          STAGING_OS_ACCOUNTS_API_URL: ${{ secrets.STAGING_OS_ACCOUNTS_API_URL }}
          STAGING_OS_ACCOUNTS_CLIENT_ID: ${{ secrets.STAGING_OS_ACCOUNTS_CLIENT_ID }}
          STAGING_SCRIBE_API_URL: ${{ secrets.STAGING_SCRIBE_API_URL }}
        run: |
          set -euo pipefail
          missing=0
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_API_ISSUER \
            APPLE_API_KEY \
            APPLE_API_KEY_P8 \
            STAGING_OS_ACCOUNTS_URL \
            STAGING_OS_ACCOUNTS_API_URL \
            STAGING_OS_ACCOUNTS_CLIENT_ID \
            STAGING_SCRIBE_API_URL
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} is required to build a staging distributable signed and notarized DMG."
              missing=1
            fi
          done
          exit "$missing"

      - name: Build staging DMG
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          OS_ACCOUNTS_URL: ${{ secrets.STAGING_OS_ACCOUNTS_URL }}
          OS_ACCOUNTS_API_URL: ${{ secrets.STAGING_OS_ACCOUNTS_API_URL }}
          OS_ACCOUNTS_CLIENT_ID: ${{ secrets.STAGING_OS_ACCOUNTS_CLIENT_ID }}
          SCRIBE_API_URL: ${{ secrets.STAGING_SCRIBE_API_URL }}
        run: pnpm tauri:build:signed-dmg --target universal-apple-darwin

      - name: Upload DMG
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: os-scribe-staging-dmg-${{ github.sha }}
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Summary
        run: |
          {
            echo "### Staging macOS DMG"
            echo "This artifact is built against the staging OS Accounts and Scribe API environment."
            for dmg in src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg src-tauri/target/release/bundle/dmg/*.dmg; do
              [ -e "$dmg" ] || continue
              echo "- \`$dmg\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"
