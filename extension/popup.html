<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>June</title>
    <style>
      /* The popup renders inside Chrome, not the June app, so the shared
         design tokens (src/styles/tokens.css) are out of reach; this local
         --fw-medium mirrors the app's weight scale (spec/font-weights.md). */
      :root {
        --fw-medium: 500;
      }
      body {
        font-family: -apple-system, system-ui, sans-serif;
        font-size: 13px;
        margin: 0;
        min-width: 220px;
        padding: 12px 14px;
        color: #1d1d1f;
      }
      h1 {
        font-size: 13px;
        font-weight: var(--fw-medium);
        margin: 0 0 6px;
      }
      p {
        margin: 0;
        color: #55555a;
      }
      .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        background: #b0b0b5;
      }
      .status-dot[data-status="paired"] {
        background: #4c8050;
      }
      .status-dot[data-status="incompatible"],
      .status-dot[data-status="unreachable"] {
        background: #c25e4c;
      }
      button {
        margin-top: 10px;
        font: inherit;
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px solid #d0d0d5;
        background: #f5f5f7;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1><span id="dot" class="status-dot"></span><span id="title">June</span></h1>
    <p id="detail">Checking connection...</p>
    <button id="retry" type="button" hidden>Try again</button>
    <script type="module" src="/src/popup.ts"></script>
  </body>
</html>
