[server]
host = "0.0.0.0"
port = 8080
request_timeout_secs = 600
max_audio_bytes = 26214400
max_json_bytes = 524288
# os-platform accepts 300 MiB attachments. The extra 1 MiB covers multipart
# framing and report text while keeping a single total request budget.
max_issue_report_bytes = 315621376
max_image_edit_bytes = 69921452
# Dedicated body cap for /v1/chat/completions, aligned with the desktop
# provider proxy's 12 MiB chat body cap (JUN-336) — the byte-image of the 6M-char
# semantic cap, sized for a 1M-token context window. Kept above the semantic
# agent chat string caps so in-window requests reach validate_agent_chat_body.
max_agent_chat_bytes = 12582912
# Global in-flight request-body budget for large-body agent routes.
max_agent_inflight_body_bytes = 1073741824
# Per-user concurrent request cap for large-body agent routes.
max_agent_concurrent_requests_per_user = 8

# Public facts shown on the /verify attestation page. source_commit is not
# set here — the Docker build stamps it via JUNE__ATTESTATION__SOURCE_COMMIT.
[attestation]
source_repo_url = "https://github.com/open-software-network/os-june"
image_repo = "ghcr.io/open-software-network/june-api"
trust_center_url = "https://trust.phala.com/app/6514acb0e08dc4825e2b6e22a46f0ed0ff455b54"

[issue_reports]
# User-submitted issue reports are filed as os-platform Issues in the June
# project. The only per-environment value is the bot user's fellow API key
# (osk_...), set via JUNE__ISSUE_REPORTS__OS_PLATFORM_API_KEY. Without it,
# reports are accepted but land in structured logs only.
os_platform_api_url = "https://app.opensoftware.co/api"
os_platform_api_key = ""
os_platform_org = "open-software"
os_platform_project = "june"
os_platform_label = "bug"
# Reward asset for the zero-reward Issue (required when the target Org has
# no default reward asset configured).
os_platform_reward_asset = "POINTS"
# Server-side diagnosis: reports arriving without a client diagnosis get one
# generated on this model at June's own expense (never metered) before they
# are filed. Unset the model to turn diagnosis off. The call is bounded by
# the timeout, a 1024-token output cap, and a per-user hourly cap that skips
# the diagnosis (never the delivery) when exhausted.
diagnosis_model = "zai-org-glm-5-2"
diagnosis_timeout_secs = 10
diagnosis_max_per_user_per_hour = 6

[computer_use]
# Emergency rollout switch. Version entries accept exact values or a trailing
# wildcard such as "0.0.*" / "15.4.*".
enabled = true
disabled_june_versions = []
disabled_macos_versions = []

[os_accounts]
# api_url has no default — must come from JUNE__OS_ACCOUNTS__API_URL
# per environment so a missing override fails loud against the dev
# fallback in AppConfig::default rather than silently hitting staging.
# iss is the canonical OS Accounts site URL used in the JWT's `iss` claim
# — the same value on staging and prod. JWKS lives on the API origin, but
# the issuer claim points at the canonical site. Confirmed by decoding a
# real staging token 2026-05-28.
iss = "https://accounts.opensoftware.co"
# aud is the canonical audience for tokens minted by OS Accounts for ANY
# consumer app, not a per-app value. Strict-string match.
aud = "open-software-apps"
jwks_refresh_secs = 300
jwks_miss_min_backoff_secs = 5
authorize_hold_ttl_note_transcribe_secs = 60
# Covers the bounded metered-inference client window (route timeout minus the
# authorize + settlement budgets = 390s) plus the settlement budget (150s),
# because note generation AND agent chat streaming settle their charge only
# after the upstream call completes. 300 let a 300-600s call reach `charge`
# with an expired hold. Same math as authorize_hold_ttl_image_secs.
authorize_hold_ttl_note_generate_secs = 540
authorize_hold_ttl_dictate_transcribe_secs = 30
authorize_hold_ttl_dictate_cleanup_secs = 30
note_transcribe_preview_max_audio_secs = 30
flat_estimate_credits = 250
# Flat per-request credits for the Venice web tools. Venice bills ~$0.01
# (about 10 credits) per /augment/search and /augment/scrape call.
web_search_credits = 20
web_fetch_credits = 20
authorize_hold_ttl_web_secs = 30

[share]
# Private sharing (JUN-308). Sharing endpoints answer 501 until a share
# database is configured. Set via JUNE__SHARE__DATABASE_URL per environment.
database_url = ""
# OS Accounts sign-in origin for the browser viewer; empty falls back to
# os_accounts.iss. The viewer OAuth client id must be registered in OS
# Accounts with redirect https://<api-origin>/s/callback.
viewer_accounts_url = ""
viewer_client_id = ""
max_ciphertext_bytes = 10485760

[upstreams.openai]
base_url = "https://api.openai.com/v1"

[upstreams.venice]
base_url = "https://api.venice.ai/api/v1"
# Requests carrying a user-supplied (BYOK) Venice key go to `byok_base_url`
# instead of `base_url`, because `base_url` may point at a June-managed
# gateway that only accepts June's own service key. Unset, it defaults to
# Venice's public API (https://api.venice.ai/api/v1).
# byok_base_url = "https://api.venice.ai/api/v1"

# Usage credit prices pass through upstream cost without a June markup.
# OpenAI lists ASR prices per MINUTE of audio ($0.003/min mini, $0.006/min 4o);
# these are the per-second conversions: $/min ÷ 60 × 1000 credits/$ × 1e6.
[pricing."gpt-4o-mini-transcribe"]
unit = "seconds"
credits_per_million_seconds = 50000
provider = "openai"
model_type = "asr"
display_name = "GPT-4o mini transcribe"
description = "Fast OpenAI speech-to-text model."
privacy = "anonymized"
context_tokens = 16000
traits = ["prompt"]
capabilities = []

[pricing."gpt-4o-transcribe"]
unit = "seconds"
credits_per_million_seconds = 100000
provider = "openai"
model_type = "asr"
display_name = "GPT-4o transcribe"
description = "Large OpenAI speech-to-text model."
privacy = "anonymized"
context_tokens = 16000
traits = ["prompt"]
capabilities = []

[pricing."nvidia/parakeet-tdt-0.6b-v3"]
unit = "seconds"
credits_per_million_seconds = 100000
provider = "venice"
model_type = "asr"
display_name = "Parakeet TDT 0.6B v3"
privacy = "private"

# Credit prices for June's legacy text-model ids. os-api's live catalog uses
# canonical ids, so it does not replace these aliases. The values include
# the upstream cost of the most expensive enabled private route.
# Keep GLM 5.2 in sync with DEFAULT_GENERATION_MODEL in the Tauri providers module.
[pricing."zai-org-glm-5-2"]
unit = "tokens"
input_credits_per_million_tokens = 1400
output_credits_per_million_tokens = 4400
provider = "venice"
model_type = "text"
display_name = "GLM 5.2"
privacy = "private"
context_tokens = 200000
capabilities = [
  "supportsFunctionCalling",
  "supportsReasoning",
  "supportsReasoningEffort",
  "supportsResponseSchema",
  "supportsWebSearch",
]

[pricing."kimi-k2-6"]
unit = "tokens"
input_credits_per_million_tokens = 1090
output_credits_per_million_tokens = 4600
provider = "venice"
model_type = "text"
display_name = "Kimi K2.6"
privacy = "private"
context_tokens = 256000
# Kimi K2.6 is natively multimodal (Venice supportsVision); it is the
# image-input fallback the app switches to. Keep in sync with the kimi-k2-6
# entry in default_pricing() (crates/config/src/lib.rs) so the fallback still
# resolves to a vision model when the live Venice catalog is unreachable and
# this packaged config is what /models serves.
capabilities = [
  "supportsFunctionCalling",
  "supportsVision",
  "supportsMultipleImages",
]

[pricing."zai-org-glm-5-1"]
unit = "tokens"
input_credits_per_million_tokens = 1400
output_credits_per_million_tokens = 4400
provider = "venice"
model_type = "text"
display_name = "GLM 5.1"
privacy = "private"
context_tokens = 200000
capabilities = [
  "supportsFunctionCalling",
  "supportsReasoning",
  "supportsReasoningEffort",
  "supportsResponseSchema",
  "supportsWebSearch",
]

[pricing."zai-org-glm-5"]
unit = "tokens"
input_credits_per_million_tokens = 1400
output_credits_per_million_tokens = 4400
provider = "venice"
model_type = "text"
display_name = "GLM 5"
privacy = "private"
context_tokens = 198000
capabilities = ["supportsFunctionCalling"]

[pricing."nvidia-nemotron-3-nano-30b-a3b"]
unit = "tokens"
input_credits_per_million_tokens = 70
output_credits_per_million_tokens = 300
provider = "venice"
model_type = "text"
display_name = "Nemotron Nano 30B (dictation cleanup)"
privacy = "private"
