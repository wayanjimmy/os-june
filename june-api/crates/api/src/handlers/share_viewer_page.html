<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Shared with you</title>
<style>/*STYLE*/</style>
</head>
<body data-accounts-url="__ACCOUNTS_URL__" data-client-id="__CLIENT_ID__">
<header id="topbar" hidden>
  <span id="topbar-title">June</span>
  <a id="download-cta" href="https://opensoftware.co/june" rel="noreferrer">Get June</a>
</header>
<main id="main">
  <section id="status" role="status">Loading&hellip;</section>
  <section id="passcode" hidden>
    <p class="eyebrow">Private share</p>
    <h1>Passcode required</h1>
    <p class="passcode-copy">Enter the passcode the sender shared with you.</p>
    <form id="passcode-form">
      <label for="passcode-input">Passcode</label>
      <input id="passcode-input" type="password" autocomplete="current-password" autofocus required>
      <button type="submit">Continue</button>
    </form>
    <p id="passcode-error" role="alert" hidden></p>
  </section>
  <article id="content" hidden>
    <h1 id="content-title"></h1>
    <p id="content-meta"></p>
    <div id="content-body"></div>
  </article>
</main>
<script>/*SCRIPT*/</script>
</body>
</html>
