<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<meta name="robots" content="noindex, nofollow, noarchive">
<title>Shared with you</title>
<style>/*STYLE*/</style>
</head>
<body data-accounts-url="__ACCOUNTS_URL__" data-client-id="__CLIENT_ID__">
<header id="topbar" hidden>
  <span id="topbar-title">Shared with June</span>
  <a id="download-cta" href="https://june.opensoftware.co" rel="noreferrer">Download June</a>
</header>
<main id="main">
  <section id="status" role="status">Loading&hellip;</section>
  <section id="prompt" hidden>
    <h1 id="prompt-title">Someone shared this with you</h1>
    <p id="prompt-sub">View it here, or open it in June for the full experience.</p>
    <div id="prompt-actions">
      <a id="prompt-download" href="https://june.opensoftware.co" rel="noreferrer">Download June</a>
      <button id="prompt-later" type="button">Maybe later</button>
    </div>
  </section>
  <article id="content" hidden>
    <h1 id="content-title"></h1>
    <p id="content-meta"></p>
    <div id="content-body"></div>
  </article>
</main>
<script>/*SCRIPT*/</script>
</body>
</html>
