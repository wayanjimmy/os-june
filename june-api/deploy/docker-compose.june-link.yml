services:
  # june.link owns a separate ingress and certificate lifecycle from the
  # primary API. A DNS/cert failure here can make share links unavailable, but
  # cannot remove port 443 from june-api.opensoftware.co.
  dstack-ingress:
    image: dstacktee/dstack-ingress:20251013@sha256:fee7a6075a271adb5a5ff72ff3ff49bcb9e22d5f4c9fa68fa683cfb3932f911c
    restart: unless-stopped
    depends_on:
      - june-link-viewer
    ports:
      - "443:443"
    environment:
      - DOMAIN=june.link
      - TARGET_ENDPOINT=http://june-link-viewer:8080
      - GATEWAY_DOMAIN=_.${DSTACK_GATEWAY_DOMAIN}
      - SET_CAA=true
      # Viewer responses are small; this protects the isolated origin from
      # accidentally inheriting the primary API's 302 MiB upload allowance.
      - CLIENT_MAX_BODY_SIZE=1m
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - cert-data:/etc/letsencrypt

  june-link-viewer:
    image: ${JUNE_IMAGE}
    restart: unless-stopped
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
    environment:
      - RUST_LOG=june=warn,june_api=warn,june_services=warn,june_providers=warn,tower_http=warn
      - JUNE__OS_ACCOUNTS__API_URL=https://accounts-api.opensoftware.co
      - JUNE__OS_ACCOUNTS__ISS=https://accounts.opensoftware.co
      - JUNE__OS_ACCOUNTS__AUD=open-software-apps
      # This is the enforcement switch: june.link serves only viewer, health,
      # and attestation routes even though it runs the same attested image.
      - JUNE__SHARE__VIEWER_ONLY=true
      - JUNE__SHARE__DATABASE_URL=${JUNE__SHARE__DATABASE_URL}
      - JUNE__SHARE__VIEWER_CLIENT_ID=${JUNE__SHARE__VIEWER_CLIENT_ID}

volumes:
  cert-data:
