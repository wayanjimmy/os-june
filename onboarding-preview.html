<!doctype html>
<!--
  Dev-only onboarding preview. Runs the real wizard in a plain browser by
  faking the Tauri IPC bridge inline: signed in, permissions grant on
  request, and the dictation practice can be watched in isolation. Nothing
  here ships: vite builds only index.html, and no app code references this
  file.

  Usage:
    npm run dev
    open http://localhost:1421/onboarding-preview.html

  Console helpers once it's open:
    june.replayOnboarding()            restart the wizard from step 1
    june.replayOnboarding("permissions")
                                       jump to a step (sign-in, permissions,
                                       telemetry, usage-intent,
                                       dictation-practice)
    __JUNE_STUB__.signOut()            back to the signed-out welcome pitch
    localStorage.setItem("os-june:theme", "dark"); location.reload()

  The preview opens signed out — the real first-run experience. Clicking
  "Continue with OpenSoftware" fake-signs-in as Sam Carter. "Change key" on
  the practice step pretends the user presses F5 a beat after recording
  starts.

  URL params (for scripted screenshots): ?theme=dark, ?step=<step id>
  (a step jump implies a signed-in account), ?perms=missing|denied
  (permissions, including system audio, start ungranted; the row actions
  then grant after a beat, so ?step=permissions&perms=missing walks the
  real grant dance)
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>June onboarding preview</title>
    <link rel="icon" href="data:," />
    <script>
      // Pre-paint theme bootstrap, same as index.html (plus a ?theme=
      // override so scripted screenshots can pick a theme per URL).
      (function () {
        try {
          var stored =
            new URLSearchParams(location.search).get("theme") ||
            localStorage.getItem("os-june:theme");
          var resolved =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (e) {}
      })();
    </script>
    <script>
      // Fake Tauri bridge. Must run before the app module so
      // @tauri-apps/api finds window.__TAURI_INTERNALS__ at import time.
      (() => {
        const callbacks = new Map();
        const listeners = new Map();
        let nextId = 1;

        function emitEvent(name, payload) {
          const ids = listeners.get(name);
          if (!ids) return;
          for (const id of ids) {
            const cb = callbacks.get(id);
            if (cb) cb({ event: name, id: 0, payload });
          }
        }

        // ?step=<id> jumps the wizard to a step (and implies an account,
        // since every step past sign-in needs one). Without it the preview
        // opens signed out: the real first-run experience.
        const params = new URLSearchParams(location.search);
        const step = params.get("step");

        // ?perms=missing starts all permissions ungranted; ?perms=denied
        // starts the mic and system audio at the System Settings dead end.
        // The row actions then grant after a beat, like the real TCC dance.
        const permsMode = params.get("perms");
        const perms = {
          microphone:
            permsMode === "denied"
              ? "denied"
              : permsMode
                ? "undetermined"
                : "granted",
          accessibility: permsMode ? "missing" : "granted",
          systemAudio:
            permsMode === "denied"
              ? "denied"
              : permsMode
                ? "undetermined"
                : "granted",
        };

        // The wizard always replays in the preview.
        try {
          localStorage.removeItem("june.onboarding.completedVersion");
          if (step) localStorage.setItem("june.onboarding.resumeStep", step);
          else localStorage.removeItem("june.onboarding.resumeStep");
        } catch (e) {}

        // A plainly-not-June account for the signed-in preview path.
        const stubUser = { id: "u1", handle: "sam", displayName: "Sam Carter" };

        // The dictation key, rebindable from the practice step. A "capture"
        // pretends the user pressed F5 a beat after recording starts.
        let pushToTalkShortcut = {
          code: "Fn",
          label: "fn",
          pressCount: 1,
          modifiers: {
            command: false,
            control: false,
            option: false,
            shift: false,
            function: true,
          },
        };
        let captureTimer;
        function dictationSettings() {
          return {
            pushToTalkShortcut,
            toggleShortcut: null,
            microphone: {},
            style: "standard",
            language: "",
          };
        }
        const p3aEvents = [];

        let account = step
          ? {
              signedIn: true,
              configured: true,
              user: stubUser,
              balance: { credits: 5000, usdMillis: 5000 },
              subscription: { subscribed: false },
            }
          : { signedIn: false, configured: true };

        // Anonymous usage statistics consent, flipped by the telemetry step
        // and the Settings > General > Privacy toggle.
        let p3aSettings = { enabled: false, consentVersion: 1, consentedAtWeek: null };

        window.__JUNE_STUB__ = {
          emitEvent,
          p3aEvents,
          signOut() {
            // The bare URL is the signed-out start.
            location.href = location.pathname;
          },
        };

        // @tauri-apps/api >= 2.11 tears listeners down through this separate
        // global; without it every unlisten throws in the browser preview.
        window.__TAURI_EVENT_PLUGIN_INTERNALS__ = {
          unregisterListener(event, id) {
            const set = listeners.get(event);
            if (set) set.delete(id);
            callbacks.delete(id);
          },
        };
        window.__TAURI_INTERNALS__ = {
          transformCallback(cb) {
            const id = nextId++;
            callbacks.set(id, cb);
            return id;
          },
          unregisterCallback(id) {
            callbacks.delete(id);
          },
          convertFileSrc(p) {
            return p;
          },
          async invoke(cmd, args = {}) {
            switch (cmd) {
              case "plugin:event|listen": {
                if (!listeners.has(args.event)) {
                  listeners.set(args.event, new Set());
                }
                listeners.get(args.event).add(args.handler);
                return args.handler;
              }
              case "plugin:event|unlisten":
                window.__TAURI_EVENT_PLUGIN_INTERNALS__.unregisterListener(
                  args.event,
                  args.eventId,
                );
                return null;
              case "os_accounts_status":
                return account;
              case "os_accounts_login":
                account = {
                  signedIn: true,
                  configured: true,
                  user: stubUser,
                  balance: { credits: 5000, usdMillis: 5000 },
                  subscription: { subscribed: false },
                };
                return account;
              case "os_accounts_open_portal":
              case "os_accounts_top_up":
                return null;
              case "p3a_settings":
                return { settings: { ...p3aSettings } };
              case "set_p3a_enabled":
                p3aSettings.enabled = Boolean(args.request && args.request.enabled);
                p3aSettings.consentedAtWeek = p3aSettings.enabled ? "2026-W28" : null;
                return { settings: { ...p3aSettings } };
              case "p3a_record":
                if (p3aSettings.enabled && args.request && args.request.questionId) {
                  p3aEvents.push(args.request.questionId);
                }
                return null;
              case "dictation_settings":
                return { settings: dictationSettings() };
              case "set_dictation_shortcut":
                if (args.kind === "push_to_talk") {
                  pushToTalkShortcut = args.shortcut;
                }
                return dictationSettings();
              case "open_privacy_settings": {
                // Pretend the user flips the toggle in System Settings and
                // comes back; the wizard's poll picks it up. System audio
                // has no poll — the row re-probes on window focus, so fake
                // the return-to-June focus too.
                const pane = args.request && args.request.pane;
                setTimeout(() => {
                  if (pane === "microphone") perms.microphone = "granted";
                  if (pane === "accessibility") perms.accessibility = "granted";
                  if (pane === "systemAudio") {
                    perms.systemAudio = "granted";
                    window.dispatchEvent(new Event("focus"));
                  }
                }, 2500);
                return null;
              }
              case "check_recording_source_readiness": {
                // The real capture-helper probe blocks while macOS shows the
                // TCC dialog; pretend the user clicks Allow after a beat.
                await new Promise((resolve) => setTimeout(resolve, 1200));
                if (perms.systemAudio === "undetermined") {
                  perms.systemAudio = "granted";
                }
                const ready = perms.systemAudio === "granted";
                return {
                  sourceMode: "microphonePlusSystem",
                  ready,
                  sources: [
                    {
                      source: "microphone",
                      required: true,
                      ready: true,
                      permissionState: "granted",
                      deviceAvailable: true,
                      captureAvailable: true,
                    },
                    {
                      source: "system",
                      required: true,
                      ready,
                      permissionState: ready ? "granted" : "denied",
                      deviceAvailable: ready,
                      captureAvailable: ready,
                      recoveryAction: "openSystemAudioSettings",
                    },
                  ],
                };
              }
              case "dictation_helper_command": {
                const type = args.command && args.command.type;
                if (type === "start_shortcut_capture") {
                  clearTimeout(captureTimer);
                  captureTimer = setTimeout(() => {
                    emitEvent(
                      "dictation-event",
                      JSON.stringify({
                        type: "shortcut_captured",
                        payload: {
                          shortcut: {
                            code: "F5",
                            label: "F5",
                            pressCount: 1,
                            modifiers: {
                              command: false,
                              control: false,
                              option: false,
                              shift: false,
                              function: false,
                            },
                          },
                        },
                      }),
                    );
                  }, 1400);
                  return null;
                }
                if (type === "cancel_shortcut_capture") {
                  clearTimeout(captureTimer);
                  return null;
                }
                if (
                  type === "request_microphone_permission" &&
                  perms.microphone === "undetermined"
                ) {
                  // Pretend the user clicks Allow on the TCC dialog.
                  setTimeout(() => {
                    perms.microphone = "granted";
                  }, 900);
                }
                if (
                  type === "request_accessibility_permission" &&
                  perms.accessibility !== "granted"
                ) {
                  setTimeout(() => {
                    perms.accessibility = "granted";
                  }, 2500);
                }
                if (
                  type === "get_permission_status" ||
                  type === "request_microphone_permission" ||
                  type === "request_accessibility_permission"
                ) {
                  setTimeout(() => {
                    emitEvent(
                      "dictation-event",
                      JSON.stringify({
                        type: "permission_status",
                        payload: { ...perms },
                      }),
                    );
                  }, 150);
                }
                return null;
              }
              case "p3a_settings":
                return { settings: p3aSettings };
              case "set_p3a_enabled": {
                const enabled = Boolean(args.request && args.request.enabled);
                p3aSettings = {
                  enabled,
                  consentVersion: 1,
                  consentedAtWeek: enabled ? "2026-W28" : null,
                };
                return { settings: p3aSettings };
              }
              case "p3a_record":
                return null;
              default:
                return null;
            }
          },
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
