msrv = "1.95"
cognitive-complexity-threshold = 30
too-many-arguments-threshold = 4
type-complexity-threshold = 250

disallowed-methods = [
  { path = "std::env::var", reason = "load typed config once in scribe-config" },
  { path = "std::env::var_os", reason = "load typed config once in scribe-config" },
  { path = "std::env::set_var", reason = "config is immutable at runtime" },
  { path = "std::env::remove_var", reason = "config is immutable at runtime" },
]
