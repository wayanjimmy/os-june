[server]
host = "0.0.0.0"
port = 8080
request_timeout_secs = 600
max_audio_bytes = 26214400
max_json_bytes = 524288

# Public facts shown on the /verify attestation page. source_commit is not
# set here — the Docker build stamps it via SCRIBE__ATTESTATION__SOURCE_COMMIT.
[attestation]
source_repo_url = "https://github.com/open-software-network/os-scribe"
image_repo = "ghcr.io/open-software-network/scribe-api"
trust_center_url = "https://trust.phala.com/app/15f8d2fd586da8b99c6082b3c2cba64127ceeb8c"

[os_accounts]
# api_url has no default — must come from SCRIBE__OS_ACCOUNTS__API_URL
# per environment so a missing override fails loud against the dev
# fallback in AppConfig::default rather than silently hitting staging.
# iss is the canonical OS Accounts site URL used in the JWT's `iss` claim
# — the same value on staging and prod. JWKS lives on the API origin, but
# the issuer claim points at the canonical site. Confirmed by decoding a
# real staging token 2026-05-28.
iss = "https://accounts.opensoftware.co"
# aud is the canonical audience for tokens minted by OS Accounts for ANY
# consumer app, not a per-app value. Strict-string match.
aud = "open-software-apps"
jwks_refresh_secs = 300
jwks_miss_min_backoff_secs = 5
authorize_hold_ttl_note_transcribe_secs = 60
authorize_hold_ttl_note_generate_secs = 300
authorize_hold_ttl_dictate_transcribe_secs = 30
authorize_hold_ttl_dictate_cleanup_secs = 30
flat_estimate_credits = 250

[upstreams.openai]
base_url = "https://api.openai.com/v1"

[upstreams.venice]
base_url = "https://api.venice.ai/api/v1"

[pricing."gpt-4o-mini-transcribe"]
unit = "seconds"
credits_per_million_seconds = 1000000
provider = "openai"
model_type = "asr"
display_name = "GPT-4o mini transcribe"
description = "Fast OpenAI speech-to-text model."
privacy = "anonymized"
context_tokens = 16000
traits = ["prompt"]
capabilities = []

[pricing."gpt-4o-transcribe"]
unit = "seconds"
credits_per_million_seconds = 2000000
provider = "openai"
model_type = "asr"
display_name = "GPT-4o transcribe"
description = "Large OpenAI speech-to-text model."
privacy = "anonymized"
context_tokens = 16000
traits = ["prompt"]
capabilities = []

[pricing."nvidia/parakeet-tdt-0.6b-v3"]
unit = "seconds"
credits_per_million_seconds = 100000
provider = "venice"
model_type = "asr"
display_name = "Parakeet TDT 0.6B v3"
privacy = "private"

[pricing."zai-org-glm-5"]
unit = "tokens"
input_credits_per_million_tokens = 1000
output_credits_per_million_tokens = 3200
provider = "venice"
model_type = "text"
display_name = "GLM 5"
privacy = "private"

[pricing."nvidia-nemotron-3-nano-30b-a3b"]
unit = "tokens"
input_credits_per_million_tokens = 70
output_credits_per_million_tokens = 300
provider = "venice"
model_type = "text"
display_name = "Nemotron Nano 30B (dictation cleanup)"
privacy = "private"
