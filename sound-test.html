<!doctype html>
<!-- Dev-only Vite entry for auditioning interface sounds. Not included in production build inputs. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>June sound test</title>
    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <style>
      :root {
        color-scheme: dark;
        font-family: var(--font-sans);
        color: #f3f0ea;
        background: #141312;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 50% -20%, rgba(160, 129, 92, 0.18), transparent 42rem),
          #141312;
      }

      main {
        width: min(900px, calc(100% - 40px));
        margin: 0 auto;
        padding: 72px 0 96px;
      }

      header {
        max-width: 620px;
        margin-bottom: 40px;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 12px;
        font-family: var(--font-serif);
        font-size: var(--fs-display);
        font-weight: 400;
        letter-spacing: -0.035em;
      }

      h2 {
        margin-bottom: 14px;
        font-size: var(--fs-md);
        font-weight: 400;
        color: #c9c3b9;
      }

      p {
        color: #aaa399;
        font-size: var(--fs-md);
        line-height: 1.6;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin: 28px 0 48px;
      }

      button {
        min-height: var(--control-xl);
        border: 1px solid #3b3834;
        border-radius: 999px;
        padding: 0 16px;
        color: #eeeae4;
        background: #211f1d;
        font: inherit;
        font-size: var(--fs-md);
        cursor: pointer;
        transition:
          border-color 140ms ease,
          background 140ms ease,
          transform 140ms ease;
      }

      button:hover {
        border-color: #6d6459;
        background: #2a2724;
      }

      button:active {
        transform: scale(0.97);
      }

      button:focus-visible,
      input:focus-visible {
        outline: 2px solid #b9956d;
        outline-offset: 3px;
      }

      .primary {
        border-color: #b9956d;
        color: #181512;
        background: #d9b98f;
      }

      .primary:hover {
        border-color: #e3c9a7;
        background: #e3c9a7;
      }

      .volume {
        display: flex;
        gap: 10px;
        align-items: center;
        min-height: var(--control-xl);
        margin-left: auto;
        color: #aaa399;
        font-size: var(--fs-md);
      }

      input[type="range"] {
        width: 110px;
        accent-color: #d9b98f;
      }

      section + section {
        margin-top: 36px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      .sound {
        display: flex;
        min-height: 136px;
        flex-direction: column;
        justify-content: space-between;
        border: 1px solid #2f2c29;
        border-radius: 18px;
        padding: 18px;
        background: rgba(31, 29, 27, 0.82);
        transition:
          border-color 160ms ease,
          background 160ms ease;
      }

      .sound[data-playing="true"] {
        border-color: #b9956d;
        background: #29231d;
      }

      .sound-top {
        display: flex;
        gap: 12px;
        justify-content: space-between;
        align-items: flex-start;
      }

      .sound h3 {
        margin: 0 0 6px;
        font-size: var(--fs-lg);
        font-weight: 400;
      }

      .sound p {
        margin-bottom: 0;
        font-size: var(--fs-sm);
        line-height: 1.4;
      }

      .play {
        width: 38px;
        min-width: 38px;
        padding: 0;
        font-size: var(--fs-xl);
      }

      code {
        color: #857e75;
        font-family: var(--font-mono);
        font-size: var(--fs-xs);
      }

      #status {
        min-height: 24px;
        margin: 18px 0 0;
        color: #d9b98f;
        font-size: var(--fs-md);
      }

      @media (max-width: 620px) {
        main {
          width: min(100% - 28px, 900px);
          padding-top: 44px;
        }

        .volume {
          width: 100%;
          margin: 8px 0 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>June sound test</h1>
        <p>
          Audition the recording cues and agent cues individually or as a family.
          Playback is intentionally sequential so each sound stays legible.
        </p>
      </header>

      <div class="controls" aria-label="Sound set controls">
        <button class="primary" type="button" data-sequence="all">Play all</button>
        <button type="button" data-sequence="recording">Recording set</button>
        <button type="button" data-sequence="agent">Agent pair</button>
        <button type="button" id="stop">Stop</button>
        <label class="volume">
          Volume
          <input id="volume" type="range" min="0" max="1" value="0.7" step="0.05" />
        </label>
      </div>

      <section aria-labelledby="recording-heading">
        <h2 id="recording-heading">Recording</h2>
        <div class="grid" id="recording-sounds"></div>
      </section>

      <section aria-labelledby="agent-heading">
        <h2 id="agent-heading">Agent</h2>
        <div class="grid" id="agent-sounds"></div>
      </section>

      <p id="status" role="status" aria-live="polite">Ready to play.</p>
    </main>

    <script>
      const sounds = [
        {
          id: "record-start",
          group: "recording",
          name: "Start",
          description: "Recording begins",
          src: "/sounds/record-start.mp3",
        },
        {
          id: "record-pause",
          group: "recording",
          name: "Pause",
          description: "Recording pauses or resumes",
          src: "/sounds/record-pause.mp3?v=2",
        },
        {
          id: "record-stop",
          group: "recording",
          name: "Stop",
          description: "Recording ends",
          src: "/sounds/record-end.mp3",
        },
        {
          id: "agent-ready",
          group: "agent",
          name: "Ready",
          description: "June finished while you were elsewhere",
          src: "/sounds/agent-ready.mp3",
        },
        {
          id: "agent-needs-input",
          group: "agent",
          name: "Needs input",
          description: "June needs attention before continuing",
          src: "/sounds/agent-needs-input.mp3",
        },
      ];

      const status = document.querySelector("#status");
      const volume = document.querySelector("#volume");
      const audio = new Audio();
      audio.preload = "auto";
      let playbackToken = 0;

      function renderSound(sound) {
        const card = document.createElement("article");
        card.className = "sound";
        card.dataset.sound = sound.id;
        card.innerHTML = `
          <div class="sound-top">
            <div>
              <h3>${sound.name}</h3>
              <p>${sound.description}</p>
            </div>
            <button class="play" type="button" aria-label="Play ${sound.name}">▶</button>
          </div>
          <code>${sound.src}</code>
        `;
        card.querySelector("button").addEventListener("click", () => playSequence([sound]));
        document.querySelector(`#${sound.group}-sounds`).append(card);
      }

      function clearPlayingState() {
        document.querySelectorAll(".sound").forEach((card) => {
          card.dataset.playing = "false";
        });
      }

      function stopPlayback(message = "Stopped.") {
        playbackToken += 1;
        audio.pause();
        audio.currentTime = 0;
        clearPlayingState();
        status.textContent = message;
      }

      async function playOne(sound, token) {
        if (token !== playbackToken) return false;
        clearPlayingState();
        const card = document.querySelector(`[data-sound="${sound.id}"]`);
        card.dataset.playing = "true";
        status.textContent = `Playing ${sound.name}.`;
        audio.src = sound.src;
        audio.volume = Number(volume.value);
        audio.currentTime = 0;

        return new Promise((resolve) => {
          const finish = () => {
            audio.removeEventListener("ended", finish);
            audio.removeEventListener("error", fail);
            card.dataset.playing = "false";
            resolve(token === playbackToken);
          };
          const fail = () => {
            status.textContent = `Could not play ${sound.name}.`;
            finish();
          };
          audio.addEventListener("ended", finish, { once: true });
          audio.addEventListener("error", fail, { once: true });
          audio.play().catch(fail);
        });
      }

      async function playSequence(sequence) {
        stopPlayback("");
        const token = playbackToken;
        for (const sound of sequence) {
          const completed = await playOne(sound, token);
          if (!completed) return;
          if (sound !== sequence.at(-1)) {
            await new Promise((resolve) => setTimeout(resolve, 360));
          }
        }
        if (token === playbackToken) status.textContent = "Sequence complete.";
      }

      sounds.forEach(renderSound);
      document.querySelectorAll("[data-sequence]").forEach((button) => {
        button.addEventListener("click", () => {
          const group = button.dataset.sequence;
          playSequence(group === "all" ? sounds : sounds.filter((sound) => sound.group === group));
        });
      });
      document.querySelector("#stop").addEventListener("click", () => stopPlayback());
      volume.addEventListener("input", () => {
        audio.volume = Number(volume.value);
      });
    </script>
  </body>
</html>
